<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D5953">
<title>Tukangin — Jasa Tukang Bali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --teal:#0D5953;--teal-d:#093E3A;--brass:#E89A2D;--brass-d:#C97D17;
  --ink:#15211F;--muted:#6A7B77;--line:#E4E9E7;--surface:#FBFAF6;--card:#fff;
  --ok:#1E9E6A;--bad:#D8473B;--hold:#B5760E;--hold-bg:#FDF4E3;
  --shadow:0 1px 3px rgba(13,89,83,.06),0 8px 24px rgba(13,89,83,.07);
  --font:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);color:var(--ink);background:#E9ECEA;display:flex;justify-content:center;font-size:15px;line-height:1.45}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px}
#phone{width:100%;max-width:440px;min-height:100vh;background:var(--surface);position:relative;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.12)}
@media(min-width:480px){#phone{margin:18px 0;min-height:calc(100vh - 36px);border-radius:30px}}
.scroll{flex:1;overflow-y:auto;padding:16px 16px 92px}
.scroll::-webkit-scrollbar{width:0}
.topbar{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:#fff;padding:14px 18px 16px;position:sticky;top:0;z-index:20}
.tb-row{display:flex;align-items:center;gap:12px}
.logo{width:34px;height:34px;border-radius:9px;background:var(--brass);display:grid;place-items:center;flex:none;font-size:18px}
.brand b{font-weight:800;font-size:17px;letter-spacing:-.02em;display:block;line-height:1.1}
.brand small{font-size:11px;opacity:.85}
.rolepill{font-size:11px;font-weight:700;background:rgba(255,255,255,.16);padding:5px 11px;border-radius:20px;margin-left:auto}
.balance{margin-top:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.balance .lbl{font-size:11px;opacity:.85;font-weight:600}
.balance .amt{font-size:20px;font-weight:800;margin-top:1px}
.sec-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:18px 2px 10px}
.sec-title:first-child{margin-top:2px}
.card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
.card+.card{margin-top:12px}
.hero{background:linear-gradient(135deg,#127A71,#0D5953);color:#fff;border-radius:18px;padding:18px;box-shadow:0 8px 24px rgba(13,89,83,.22)}
.hero h3{font-size:17px;font-weight:800}
.hero p{font-size:12.5px;opacity:.9;margin-top:3px}
.hero button{margin-top:13px;background:var(--brass);color:#3a2400;font-weight:800;font-size:14px;padding:11px 16px;border-radius:11px}
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.cat{background:var(--card);border-radius:14px;padding:12px 4px 9px;text-align:center;box-shadow:var(--shadow)}
.cat .ic{font-size:22px;display:block;margin-bottom:5px}
.cat .nm{font-size:10.5px;font-weight:600;line-height:1.15}
.ocard{padding:14px}
.ocard .top{display:flex;gap:12px;align-items:flex-start}
.othumb{width:48px;height:48px;border-radius:12px;background:var(--surface);display:grid;place-items:center;font-size:24px;flex:none;border:1px solid var(--line)}
.ocard h4{font-size:15px;font-weight:700}
.ocard .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ocard .price{font-weight:800;font-size:15px;text-align:right;white-space:nowrap;margin-left:auto}
.ocard .price small{display:block;font-size:10px;color:var(--muted);font-weight:600}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px}
.b-wait{background:#FEF3E0;color:var(--hold)}.b-hold{background:var(--hold-bg);color:var(--hold)}
.b-work{background:#E5F0FF;color:#2563c9}.b-confirm{background:#EAF6F0;color:#15875a}
.b-done{background:#E7F5EC;color:var(--ok)}.b-dispute{background:#FBE9E7;color:var(--bad)}
.divider{height:1px;background:var(--line);margin:13px 0}
.dot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.5}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:13px;font-weight:700;font-size:15px}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--teal);color:#fff}.btn-brass{background:var(--brass);color:#3a2400}
.btn-ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.btn-danger{background:#fff;color:var(--bad);border:1.5px solid #f3cdc9}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-sm{padding:10px 14px;font-size:13px;border-radius:10px;width:auto}
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px}
.field .hint{font-size:11.5px;color:var(--muted);font-weight:500}
.input{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;color:var(--ink);outline:none}
.input:focus{border-color:var(--teal)}
textarea.input{resize:vertical;min-height:78px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 13px;border-radius:10px;background:#fff;border:1.5px solid var(--line);font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.estbox{background:linear-gradient(135deg,#FDF4E3,#FBEAC8);border:1px solid #f0dca8;border-radius:14px;padding:14px}
.estbox .lab{font-size:11px;font-weight:700;color:var(--brass-d);text-transform:uppercase}
.estbox .rng{font-size:20px;font-weight:800;color:#5a3d05;margin-top:3px}
.estbox .note{font-size:11px;color:#8a6a2a;margin-top:4px}
.fee{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px}
.feerow{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.feerow.tot{border-top:1.5px dashed var(--line);margin-top:6px;padding-top:11px;font-weight:800;font-size:16px}
.feerow .sub{color:var(--muted);font-size:11.5px}
.escrow-banner{background:linear-gradient(135deg,#093E3A,#0D5953);border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden}
.escrow-banner .lk{position:absolute;right:-10px;bottom:-14px;font-size:90px;opacity:.08}
.escrow-banner .st{font-size:11px;font-weight:700;opacity:.85;text-transform:uppercase}
.escrow-banner .amt{font-size:25px;font-weight:800;margin-top:2px}
.escrow-banner .sub{font-size:12px;opacity:.9;margin-top:5px}
.otpcard{background:#fff;border:2px dashed var(--brass);border-radius:16px;padding:16px;text-align:center}
.otpcard .lab{font-size:11.5px;font-weight:700;color:var(--brass-d);text-transform:uppercase}
.otpcard .code{font-size:36px;font-weight:800;letter-spacing:.18em;margin:6px 0 2px}
.otpcard .note{font-size:11.5px;color:var(--muted)}
.chatbox{background:#fff;border-radius:14px;border:1px solid var(--line);overflow:hidden}
.chat-warn{background:var(--hold-bg);color:var(--hold);font-size:11px;font-weight:600;padding:8px 12px}
.msgs{padding:12px;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto}
.msg{max-width:78%;padding:9px 12px;border-radius:14px;font-size:13.5px}
.msg.me{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px}
.chat-in{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
.chat-in input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:10px 14px;outline:none}
.chat-in button{width:42px;height:42px;border-radius:50%;background:var(--teal);color:#fff;flex:none}
.logitem{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.logitem:last-child{border-bottom:none}
.logitem .ldot{width:9px;height:9px;border-radius:50%;background:var(--teal);margin-top:5px;flex:none}
.logitem h6{font-size:13px;font-weight:700}
.logitem p{font-size:11.5px;color:var(--muted);margin-top:1px}
.botnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:7px 6px 9px;z-index:20}
.navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;color:var(--muted);font-size:10.5px;font-weight:600}
.navb svg{width:23px;height:23px}.navb.on{color:var(--teal)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:.28s;max-width:380px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:42px 20px;color:var(--muted)}
.empty .ic{font-size:44px;opacity:.5}.empty p{font-size:13.5px;margin-top:8px}
.infoline{display:flex;gap:8px;font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;align-items:flex-start}
.profav{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--brass),var(--brass-d));display:grid;place-items:center;color:#fff;font-weight:800;font-size:22px}
.kyc{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ok);background:#E7F5EC;padding:3px 9px;border-radius:7px;margin-top:5px}
/* auth */
.auth{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;min-height:100vh}
.auth .logo-lg{width:60px;height:60px;border-radius:16px;background:var(--brass);display:grid;place-items:center;font-size:30px;margin-bottom:16px}
.auth h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.auth p.sub{font-size:13.5px;color:var(--muted);margin:4px 0 22px}
.seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;margin-bottom:18px}
.seg button{flex:1;padding:10px;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--muted)}
.seg button.on{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.errbox{background:#FBE9E7;color:#a8352a;font-size:12.5px;font-weight:600;padding:11px 13px;border-radius:11px;margin-bottom:14px}
.loadwrap{flex:1;display:grid;place-items:center;min-height:100vh;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="phone"><div id="app"><div class="loadwrap"><div><div class="spinner"></div>Memuat…</div></div></div></div>
<div class="toast" id="toast"></div>
<script>
/* ====== KONFIGURASI ====== */
const SUPA_URL="https://uzngebmqhksfmmqwrelk.supabase.co";
const SUPA_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV6bmdlYm1xaGtzZm1tcXdyZWxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5Mjc2NzEsImV4cCI6MjA5NzUwMzY3MX0.yFMZojlMQz9GQ_r-33G_DEYHchg2Kt-phfWNo3UQDiM";
const AI_ENDPOINT=""; // <== isi URL Cloudflare Worker Anda untuk taksir AI. Kosong = pakai estimator lokal.

const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

/* ====== util ====== */
const rp=n=>'Rp'+Math.round(n||0).toLocaleString('id-ID');
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const initial=n=>(n||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600)}
const FEE={layanan:0.05,komisi:0.06};
function fee(h){h=+h||0;const layanan=Math.round(h*FEE.layanan),komisi=Math.round(h*FEE.komisi);return{harga:h,layanan,komisi,escrow:h+layanan,payout:h-komisi}}
const KAT=[{id:'listrik',nm:'Listrik',ic:'⚡'},{id:'pipa',nm:'Pipa',ic:'🔧'},{id:'ac',nm:'AC',ic:'❄️'},{id:'las',nm:'Las/Pagar',ic:'🔥'},{id:'cat',nm:'Cat',ic:'🎨'},{id:'bocor',nm:'Atap Bocor',ic:'🏠'},{id:'kunci',nm:'Kunci',ic:'🔑'},{id:'umum',nm:'Lainnya',ic:'🛠️'}];
const katOf=id=>KAT.find(k=>k.id===id)||KAT[7];
const ST={MENUNGGU_DANA:{l:'Menunggu Pembayaran',c:'b-wait'},MENUNGGU_VERIFIKASI:{l:'Cek Pembayaran',c:'b-wait'},DANA_DITAHAN:{l:'Dana Ditahan',c:'b-hold'},DIKERJAKAN:{l:'Dikerjakan',c:'b-work'},MENUNGGU_KONFIRMASI:{l:'Menunggu Konfirmasi',c:'b-confirm'},SELESAI:{l:'Selesai',c:'b-done'},SENGKETA:{l:'Sengketa',c:'b-dispute'},DIBATALKAN:{l:'Dibatalkan',c:'b-dispute'}};
/* Identitas usaha — EDIT di sini bila perlu */
const BIZ={nama:'Tukangin',badan:'Guna Merta Home Service',pemilik:'Deny',kota:'Bali',alamat:'Jln Tukad Irawadi No. 44',wa:'6281338773717',waTampil:'0813-3877-3717',bank:'BNI',rek:'1881552632',rekNama:'Putu Helyvia',garansiHari:7,retensiPersen:10,markupHarian:0.15};
/* Garansi pengerjaan per kategori (hari) — sesuai umumnya di Bali, bisa diubah */
const GARANSI={listrik:7,pipa:14,ac:14,las:30,cat:14,bocor:30,kunci:7,umum:7};
function garansiHariKat(kat){return GARANSI[kat]||7}
const otp=()=>String(Math.floor(1000+Math.random()*9000));

/* ====== state ====== */
let ME=null;            // profil pengguna login
let VIEW={tab:'beranda',orderId:null};
let ORDERS=[];

/* ====== AUTH ====== */
let authMode='welcome';
async function boot(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){renderAuth();return}
  await loadMe();
}
async function loadMe(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){renderAuth();return}
  let {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
  if(!prof){ // profil belum ada (mis. daftar tapi gagal simpan) -> minta lengkapi
    renderCompleteProfile(user);return;
  }
  ME=prof;
  VIEW={tab: ME.role==='pemilik'?'beranda':'kerja', orderId:null};
  await refresh();
  setupRealtime();
}
function renderAuth(){
  if(authMode==='welcome'){$('app').innerHTML=welcomeHTML();return;}
  $('app').innerHTML=`<div class="auth">
    <div style="margin-bottom:6px"><span onclick="setAuth('welcome')" style="color:var(--muted);font-size:13px">‹ Kembali</span></div>
    <div class="logo-lg">🔧</div>
    <h1>Tukangin</h1><p class="sub">Tukang tepercaya, dana aman lewat escrow.</p>
    <div class="seg"><button id="seg-login" class="${authMode==='login'?'on':''}" onclick="setAuth('login')">Masuk</button>
      <button id="seg-daftar" class="${authMode==='daftar'?'on':''}" onclick="setAuth('daftar')">Daftar</button></div>
    <div id="autherr"></div>
    <div id="authform"></div>
  </div>`;
  renderAuthForm();
}
function welcomeHTML(){return `<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:linear-gradient(160deg,#0D5953,#0b463f)">
  <div style="flex:1;padding:42px 26px 20px;color:#fff;display:flex;flex-direction:column;justify-content:center">
    <div style="font-size:52px">🔧</div>
    <h1 style="font-size:33px;font-weight:800;margin-top:10px;line-height:1.1">Tukangin</h1>
    <p style="font-size:16px;color:#BFE0DB;margin-top:8px;line-height:1.5">Tukang terpercaya untuk rumah & villa di Bali. Pesan mudah, bayar aman, bergaransi.</p>
    <div style="margin-top:24px;display:flex;flex-direction:column;gap:11px">
      ${[['✔️','Tukang terverifikasi','Identitas (KTP & wajah) dicek'],['🔒','Pembayaran aman','Dana ditahan sampai kerja selesai'],['🛡️','Bergaransi','Ada masalah? Diperbaiki tanpa biaya']].map(([i,t,s])=>`<div style="display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.12);border-radius:14px;padding:13px 15px"><div style="font-size:21px">${i}</div><div><div style="font-weight:800;font-size:14.5px">${t}</div><div style="font-size:12px;color:#cfe7e3">${s}</div></div></div>`).join('')}
    </div>
  </div>
  <div style="background:var(--surface);border-radius:26px 26px 0 0;padding:24px 22px 30px">
    <button class="btn btn-primary" style="font-size:17px;padding:16px" onclick="setAuth('daftar')">Daftar Gratis</button>
    <button class="btn btn-ghost" style="margin-top:11px" onclick="setAuth('login')">Sudah punya akun? Masuk</button>
    <p style="text-align:center;font-size:11px;color:var(--muted);margin-top:16px">Dikelola <b>Guna Merta Home Service</b> · Canggu, Bali</p>
  </div>
</div>`;}
function setAuth(m){authMode=m;renderAuth()}
function renderAuthForm(){
  if(authMode==='daftar'){
    $('authform').innerHTML=`
      <div class="field"><label>Saya seorang</label>
        <div class="seg" id="roleseg"><button class="on" data-r="pemilik" onclick="pickRole(this)">👤 Pemilik (cari tukang)</button>
        <button data-r="tukang" onclick="pickRole(this)">🛠️ Tukang</button></div></div>
      <div class="field"><label>Nama lengkap</label><input class="input" id="a_nama" placeholder="Nama Anda"></div>
      <div class="field"><label>No. WhatsApp</label><input class="input" id="a_telp" inputmode="tel" placeholder="08…"></div>
      <div class="field"><label>Email</label><input class="input" id="a_email" inputmode="email" placeholder="email@contoh.com"></div>
      <div class="field"><label>Password</label><input class="input" id="a_pass" type="password" placeholder="Min. 6 karakter"></div>
      <div style="margin:2px 2px 14px">
        <label style="display:flex;gap:9px;align-items:flex-start;font-size:12px;color:#46605c;line-height:1.45"><input type="checkbox" id="a_setuju" style="margin-top:2px;width:16px;height:16px;flex-shrink:0"><span>Saya menyetujui Aturan & Komitmen Tukangin.</span></label>
        <div style="font-size:11.5px;margin-top:5px;margin-left:25px"><b onclick="openAturanTukang()" style="color:var(--brand);text-decoration:underline">Baca aturannya →</b></div>
      </div>
      <button class="btn btn-primary" id="a_btn" onclick="doDaftar()">Buat Akun</button>`;
  }else{
    $('authform').innerHTML=`
      <div class="field"><label>Email</label><input class="input" id="a_email" inputmode="email" placeholder="email@contoh.com"></div>
      <div class="field"><label>Password</label><input class="input" id="a_pass" type="password" placeholder="Password"></div>
      <button class="btn btn-primary" id="a_btn" onclick="doLogin()">Masuk</button>`;
  }
}
let pickedRole='pemilik';
function pickRole(b){pickedRole=b.dataset.r;document.querySelectorAll('#roleseg button').forEach(x=>x.classList.remove('on'));b.classList.add('on')}
function authErr(m){$('autherr').innerHTML=m?`<div class="errbox">${esc(m)}</div>`:''}
function busy(on,label){const b=$('a_btn');if(b){b.disabled=on;b.textContent=on?'Mohon tunggu…':label}}

async function doDaftar(){
  authErr('');
  const nama=$('a_nama').value.trim(),telp=$('a_telp').value.trim(),email=$('a_email').value.trim(),pass=$('a_pass').value;
  if(!nama||!email||pass.length<6){authErr('Lengkapi nama, email, dan password (min. 6 karakter).');return}
  if(pickedRole==='tukang'&&!($('a_setuju')&&$('a_setuju').checked)){authErr('Centang persetujuan Aturan & Komitmen Tukang dulu.');return}
  busy(true,'Buat Akun');
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){authErr(error.message);busy(false,'Buat Akun');return}
  if(!data.session){ // email confirm masih aktif

async function refresh(){

function myOrders(){return ORDERS.filter(o=>o.pemilik_id===ME.id)}
let RT=null,_rtT=null;
function setupRealtime(){
  try{
    if(RT){sb.removeChannel(RT);RT=null;}
    RT=sb.channel('rt-tukangin')
      .on('postgres_changes',{event:'*',schema:'public',table:'orders'},rtEvent)
      .on('postgres_changes',{event:'*',schema:'public',table:'messages'},rtEvent)
      .subscribe();
    if(ME&&ME.is_admin&&'Notification'in window&&Notification.permission==='default'){try{Notification.requestPermission();}catch(e){}}
  }catch(e){}
}
function rtEvent(payload){
  rtNotify(payload);
  clearTimeout(_rtT);
  _rtT=setTimeout(()=>{refresh();},600);
}
function rtNotify(payload){
  if(!ME)return;
  const o=payload.new||{};let msg=null;
  if(payload.table==='messages'){ if(o.sender_id&&o.sender_id!==ME.id)msg='💬 Pesan baru masuk'; }
  else if(payload.table==='orders'&&ME.is_admin){
    if(o.status==='MENUNGGU_VERIFIKASI')msg='💵 Pembayaran baru — perlu dicek';
    else if(o.status==='MENUNGGU_KONFIRMASI')msg='✅ Pekerjaan menunggu konfirmasi';
    else if(o.status==='SENGKETA')msg='⚠️ Ada sengketa baru';
  }
  if(msg){toast(msg);notifBrowser(msg);}
}
function notifBrowser(text){
  try{
    if(!('Notification'in window))return;
    if(Notification.permission==='granted')new Notification('Tukangin',{body:text});
    else if(Notification.permission==='default')Notification.requestPermission();
  }catch(e){}
}
function adminPending(){
  if(!ME||!ME.is_admin||!Array.isArray(ORDERS))return 0;
  return ORDERS.filter(o=>o.status==='MENUNGGU_VERIFIKASI'||(o.status==='DANA_DITAHAN'&&!o.tukang_id)||o.garansi_klaim).length;
}
let _myLoc=null,_trackTimer=null,_trackOrder=null;
function ensureMyLoc(){if(_myLoc||!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>{_myLoc={lat:p.coords.latitude,lng:p.coords.longitude};if(VIEW&&VIEW.tab==='kerja'&&!VIEW.orderId)render();},()=>{},{enableHighAccuracy:false,timeout:8000,maximumAge:60000});}
function jarakKe(o){return (_myLoc&&o.lat&&o.lng)?haversine(_myLoc.lat,_myLoc.lng,o.lat,o.lng):null;}
function fmtJarak(m){return m==null?'':(m>1000?(m/1000).toFixed(1)+' km':Math.round(m)+' m');}
function tukangAvailable(){
  let arr=ORDERS.filter(o=>!o.tukang_id&&o.status==='DANA_DITAHAN');
  if(_myLoc)arr=arr.slice().sort((a,b)=>((jarakKe(a)??1e12)-(jarakKe(b)??1e12)));
  return arr;
}
function startTracking(orderId){
  if(_trackOrder===orderId&&_trackTimer)return;
  stopTracking();
  if(!navigator.geolocation)return;
  _trackOrder=orderId;
  const send=()=>navigator.geolocation.getCurrentPosition(async pos=>{
    try{await sb.from('orders').update({tukang_lat:pos.coords.latitude,tukang_lng:pos.coords.longitude,loc_updated:new Date().toISOString()}).eq('id',orderId);}catch(e){}
  },()=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
  send();_trackTimer=setInterval(send,25000);
}
function stopTracking(){if(_trackTimer)clearInterval(_trackTimer);_trackTimer=null;_trackOrder=null;}
function locTukangSection(o){
  if(!o.tukang_id||o.tukang_lat==null||!o.loc_updated)return '';
  if(!['DANA_DITAHAN','DIKERJAKAN'].includes(o.status))return '';
  const amP=o.pemilik_id===ME.id;
  if(!(amP||ME.is_admin||o.tukang_id===ME.id))return '';
  let jarak='';
  if(o.lat&&o.lng){jarak=fmtJarak(haversine(o.tukang_lat,o.tukang_lng,o.lat,o.lng));}
  return `<div class="sec-title">📍 Lokasi Tukang (langsung)</div>
    <div class="card" style="padding:14px">
      <div style="font-size:13.5px">${jarak?`Sekitar <b>${jarak}</b> dari lokasi pekerjaan`:'Lokasi tukang tersedia'}</div>
      <div class="meta" style="margin-top:2px">Diperbarui ${timeAgo(o.loc_updated)}</div>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="openPetaLangsung('${o.id}')">🗺️ Lihat Peta Langsung</button>
      <a href="https://www.google.com/maps?q=${o.tukang_lat},${o.tukang_lng}" target="_blank" style="display:block;text-align:center;font-size:11.5px;color:var(--brand);margin-top:8px;text-decoration:none">Buka di Google Maps ↗</a>
    </div>`;
}

function pilihKyc(jenis){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.setAttribute('capture',jenis==='wajah'?'user':'environment');
  inp.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  inp.onchange=()=>{if(inp.files&&inp.files[0])uploadKyc(jenis,inp.files[0]);inp.remove();};
  document.body.appendChild(inp);inp.click();
}
async function uploadKyc(jenis,file){
  toast('Memproses…');
  try{
    const dataUrl=await kompresFoto(file);
    let warnFace=false;
    if(jenis==='wajah'){try{if('FaceDetector'in window){const img=new Image();img.src=dataUrl;await img.decode();const faces=await new FaceDetector().detect(img);warnFace=!faces||faces.length===0;}}catch(e){}}
    const col=jenis==='ktp'?'ktp_url':'wajah_url';
    const {error}=await sb.from('profiles').update({[col]:dataUrl}).eq('id',ME.id);
    if(error)throw error;
    ME[col]=dataUrl;render();
    toast(warnFace?'⚠️ Tersimpan, tapi wajah kurang jelas — sebaiknya foto ulang':'✅ Foto tersimpan');
  }catch(e){toast('Gagal: '+(e.message||e))}
}
function validateNIK(nik){
  if(!/^\d{16}$/.test(nik))return 'NIK harus 16 angka.';
  let dd=parseInt(nik.substr(6,2),10),mm=parseInt(nik.substr(8,2),10);
  if(dd>40)dd-=40;
  if(mm<1||mm>12||dd<1||dd>31)return 'NIK tidak valid (cek angka tanggal lahir).';
  return '';
}
async function kirimVerifikasi(){
  if(!ME.ktp_url||!ME.wajah_url){toast('Unggah KTP & selfie dulu');return}
  const nik=($('nikInput')?.value||'').trim();
  const err=validateNIK(nik);
  if(err){toast('⚠️ '+err);return}
  toast('Memeriksa…');
  try{const {data:dup}=await sb.rpc('nik_terpakai',{p_nik:nik});if(dup){toast('❌ KTP ini sudah dipakai akun lain.');return}}catch(e){}
  try{const {data:blk}=await sb.rpc('cek_blokir',{p_nik:nik,p_telp:ME.telp||null});if(blk){toast('❌ Pendaftaran tidak dapat dilanjutkan.');return}}catch(e){}
  const {error}=await sb.from('profiles').update({nik,verif_status:'menunggu'}).eq('id',ME.id);
  if(error){toast('Gagal: '+error.message);return}
  ME.nik=nik;ME.verif_status='menunggu';render();toast('Terkirim — menunggu peninjauan admin');
}

async function verifPembayaran(id){

function p_bayar(o){const t=(ADMIN_TUKANG||[]).find(x=>x.id===o.tukang_id);return t&&t.bayar_metode?esc(t.bayar_metode+(t.bayar_detail?' '+t.bayar_detail:'')):'metode belum diatur';}
function waLink(telp,msg){let n=(telp||'').replace(/\D/g,'');if(!n)return '';if(n[0]==='0')n='62'+n.slice(1);else if(n[0]==='8')n='62'+n;return `https://wa.me/${n}?text=${encodeURIComponent(msg||'')}`;}
function p_wa(o){const t=(ADMIN_TUKANG||[]).find(x=>x.id===o.tukang_id);const tel=t&&t.telp;if(!tel)return '';const b=o.biaya||fee(o.harga);return waLink(tel,`Halo ${o.tukang_nama||''}, pekerjaan "${o.judul||'-'}" sudah selesai. Bayaran Anda ${rp(b.payout)} akan kami cairkan. Mohon konfirmasi penerimaan. — Tukangin`);}
async function bayarTukang(id){

  if(error){toast('Gagal: '+error.message);return}

async function ambilDataEkspor(){

async function eksporCSV(){
  toast('Menyiapkan CSV…');

  const headers=rows.length?Object.keys(rows[0]):['Tanggal','Kode','Pemilik','Status'];
  const cel=v=>{v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[headers.join(',')].concat(rows.map(r=>headers.map(h=>cel(r[h])).join(','))).join('\n');
  unduhBlob(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),`Pesanan-Tukangin-${tglFile()}.csv`);

function statTukang(){
  const mine=ORDERS.filter(o=>o.tukang_id===ME.id);
  const selesai=mine.filter(o=>o.status==='SELESAI');
  const aktif=mine.filter(o=>['DANA_DITAHAN','DIKERJAKAN'].includes(o.status));
  const nunggu=mine.filter(o=>o.status==='MENUNGGU_KONFIRMASI');
  const sum=arr=>arr.reduce((s,o)=>s+((o.biaya||fee(o.harga)).payout||0),0);
  const retensi=selesai.filter(o=>{const g=garansiInfo(o);return g&&g.aktif;}).reduce((s,o)=>s+Math.round(((o.biaya||fee(o.harga)).payout||0)*(BIZ.retensiPersen||0)/100),0);
  return {selesai:selesai.length,aktif:aktif.length,total:sum(selesai),pending:sum(nunggu),retensi};
}

function pickKat(id,el){draft.kat=id;document.querySelectorAll('#katchips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');const le=$('lasextra');if(le)le.style.display=id==='las'?'block':'none';}

function pickSistem(s,el){draft.sistem=s;document.querySelectorAll('#sysseg button').forEach(b=>b.classList.remove('on'));el.classList.add('on');const bo=$('borongan'),ha=$('harian');if(bo)bo.style.display=s==='borongan'?'block':'none';if(ha)ha.style.display=s==='harian'?'block':'none';}
function hitungHarian(){
  const t=+draft.tarif||0,h=+draft.hari||0,box=$('harianringkas');if(!box)return;
  if(!t||!h){box.querySelector('.rng').textContent='Isi tarif & jumlah hari';box.querySelector('.note').textContent='Sudah termasuk biaya layanan.';return}

async function estimasiAI(){
  if(draft.kat==='las'){ if(!(draft.panjang&&draft.tinggi)&&(draft.desk||'').trim().length<6){toast('Isi ukuran atau deskripsi dulu');return} }
  else if((draft.desk||'').trim().length<6){toast('Isi deskripsi dulu');return}
  const box=$('estbox'),btn=$('aibtn');btn.disabled=true;btn.textContent='Menaksir…';
  const h=await taksir(draft);
  box.querySelector('.rng').textContent=`${rp(h.min)} – ${rp(h.max)}`;
  box.querySelector('.note').textContent=h.alasan;
  const f=$('d_harga');draft.harga=String(h.rekomendasi);if(f)f.value=rp(h.rekomendasi);
  btn.disabled=false;btn.textContent='✨ Taksir Ulang';
}
async function taksir(d){
  const kat=d.kat,desk=d.desk||'';
  const luas=(parseFloat(d.panjang)||0)*(parseFloat(d.tinggi)||0);
  if(AI_ENDPOINT){
    try{
      let prompt;
      if(kat==='las'&&luas>0){
        const isPintu=/dorong|sliding|geser|pintu|gerbang/i.test(desk);
        prompt=`Anda penaksir harga jasa las/pagar besi di ${d.lokasi||'Bali'}, Bali, memakai harga pasar lokal terkini. Pekerjaan pagar/pintu besi ukuran ${d.panjang}m x ${d.tinggi}m = ${luas.toFixed(1)} m².${isPintu?' Ini PINTU DORONG (sliding) — tambahkan biaya rel, roda, dan rangka penguat.':''} Lingkup: ${d.material?'TERMASUK material (besi hollow, spandek, rel, roda, cat).':'JASA saja (las + pasang, material disediakan pemilik).'} Deskripsi: "${desk}". Hitung per m² lalu total. Balas HANYA JSON {"min":n,"max":n,"rekomendasi":n,"alasan":"maks 12 kata"}`;
      }else{
        prompt=`Anda penaksir harga JASA tukang di ${d.lokasi||'Bali'}, Bali, memakai harga pasar lokal terkini. Patokan kasar: ganti bohlam/saklar Rp25.000-75.000; keran/pipa kecil Rp75.000-200.000; cuci AC Rp60.000-150.000; listrik kecil Rp150.000-400.000; cat ruangan Rp300.000-800.000. Minimum panggil Rp50.000. Kategori: ${katOf(kat).nm}. Deskripsi: "${desk}". Balas HANYA JSON {"min":n,"max":n,"rekomendasi":n,"alasan":"maks 10 kata"}`;
      }
      const r=await fetch(AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      const dd=await r.json();const t=(dd.content||[]).map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
      const j=JSON.parse(t);if(typeof j.min==='number')return{min:j.min,max:j.max,rekomendasi:j.rekomendasi||Math.round((j.min+j.max)/2),alasan:j.alasan||'Taksiran AI'};
    }catch(e){}
  }
  return taksirLokal(d);
}
function taksirLokal(d){
  const kat=d.kat,t=(d.desk||'').toLowerCase();
  const luas=(parseFloat(d.panjang)||0)*(parseFloat(d.tinggi)||0);
  if(kat==='las'&&luas>0){
    const isPintu=/dorong|sliding|geser|pintu|gerbang/.test(t);
    let lo,hi; if(d.material){lo=400000;hi=650000}else{lo=100000;hi=250000}
    let min=luas*lo,max=luas*hi;
    if(isPintu){if(d.material){min+=600000;max+=1500000}else{min+=200000;max+=500000}}
    min=Math.round(min/10000)*10000;max=Math.round(max/10000)*10000;
    return{min,max,rekomendasi:Math.round((min+max)/2/10000)*10000,alasan:`Per m² (${d.material?'+material':'jasa'})${isPintu?' · pintu dorong':''}`};
  }
  if(/bohlam|lampu|saklar|stop ?kontak|fitting/.test(t)&&/ganti|pasang|mati|rusak|baru/.test(t))return{min:25000,max:75000,rekomendasi:50000,alasan:'Pekerjaan ringan'};
  const base={listrik:[100000,400000],pipa:[100000,400000],ac:[60000,200000],las:[200000,700000],cat:[300000,900000],bocor:[200000,600000],kunci:[80000,250000],umum:[75000,400000]};
  let[lo,hi]=base[kat]||base.umum;let f=1;
  if(/ganti|total|semua|banyak|besar|parah/.test(t))f+=0.4;if(/cek|kecil|ringan|mudah/.test(t))f-=0.25;
  f=Math.max(0.6,Math.min(1.6,f));lo=Math.max(50000,Math.round(lo*f/5000)*5000);hi=Math.round(hi*f/5000)*5000;
  return{min:lo,max:hi,rekomendasi:Math.round((lo+hi)/2/5000)*5000,alasan:'Estimasi kategori'};
}

async function bayar(id){
  const o=ORDERS.find(x=>x.id===id);
  if(!o.bukti_transfer_url){toast('Unggah bukti transfer dulu ya');return}
  await sb.from('orders').update({status:'MENUNGGU_VERIFIKASI'}).eq('id',id);
  await addLog(id,'Pemilik menyatakan sudah transfer','Menunggu verifikasi admin');
  await refresh();openOrder(id);toast('Terkirim — menunggu admin memverifikasi pembayaran');
}
async function ambil(id){
  if(ME.verif_status!=='terverifikasi'){toast('Selesaikan verifikasi identitas dulu');VIEW.tab='profil';render();return}
  const {error}=await sb.rpc('ambil_pesanan',{p_order:id});
  if(error){toast('Gagal: '+error.message);return}
  VIEW.tab='aktif';await refresh();openOrder(id);toast('Pekerjaan diambil');

function hariPenuh(o){return (o.absensi||[]).filter(a=>a.masuk&&a.keluar).length}
function jamID(t){return t?new Date(t).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}):'—'}
function tgljamID(t){return new Date(t).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}
function praKerjaSection(o,amPemilik){
  if(!o.tukang_id||!['DANA_DITAHAN','DIKERJAKAN'].includes(o.status))return '';
  const amT=o.tukang_id===ME.id, sv=o.survei||{};
  let svHtml;
  if(sv.sudah) svHtml=`<div class="infoline" style="background:#E7F5EC"><span>✅ Sudah survei lokasi${sv.waktu?' · '+timeAgo(sv.waktu):''}.</span></div>`;
  else if(amT) svHtml=`<button class="btn btn-primary btn-sm" onclick="surveiLokasi('${o.id}')">📍 Catat Survei Lokasi (GPS)</button><p style="font-size:11px;color:var(--muted);margin-top:6px">Cek lokasi dulu sebelum mulai. Tekan saat Anda tiba untuk survei.</p>`;
  else svHtml=`<div class="infoline"><span>⌛ Tukang belum survei lokasi.</span></div>`;
  return `<div class="sec-title">Survei Lokasi</div>
   <div class="card" style="padding:14px">${svHtml}
     <div class="infoline" style="margin-top:12px;background:#FFF7E8"><span>💡 Semua kesepakatan & pembayaran <b>lewat aplikasi</b> agar tercatat dan aman bagi kedua pihak.</span></div>
   </div>`;
}
async function surveiLokasi(id){
  toast('Mengambil lokasi…');let loc={};try{const p=await getGPS();loc={lat:p.lat,lng:p.lng};}catch(e){}
  const survei={sudah:true,waktu:new Date().toISOString(),...loc};
  const {error}=await sb.from('orders').update({survei}).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,'Survei lokasi','Tukang telah survei lokasi');toast('✅ Survei tercatat');await refresh();openOrder(id);
}
function absensiSection(o){
  if(o.sistem!=='harian')return '';
  const list=o.absensi||[];
  if(!list.length&&!['DANA_DITAHAN','DIKERJAKAN'].includes(o.status))return '';
  const hp=hariPenuh(o);
  const rows=list.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line)">
    <div style="font-size:12px;font-weight:800;width:50px">Hari ${a.hari}</div>
    <div style="flex:1;font-size:12px;color:#37514d">${tgljamID(a.masuk)} · 🟢 ${jamID(a.masuk)}${a.keluar?' → 🔴 '+jamID(a.keluar):' <span style="color:var(--hold)">· belum keluar</span>'}</div>
    ${a.jarak!=null?(a.jarak>500?'<span style="font-size:10px;color:var(--bad);font-weight:700">⚠ jauh</span>':'<span style="font-size:10px;color:var(--ok);font-weight:700">✓ GPS</span>'):''}
  </div>`).join('')||'<p style="font-size:12px;color:var(--muted);padding:6px 0">Belum ada absensi.</p>';
  return `<div class="sec-title">Absensi Harian · ${hp} hari hadir</div>
    <div class="card" style="padding:10px 16px">${rows}
    <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:13.5px;font-weight:800"><span>Bayaran ${hp} hari hadir</span><span style="color:var(--ok)">${rp((o.tarif_harian||0)*hp)}</span></div></div>`;
}
async function absenMasuk(id){
  const o=ORDERS.find(x=>x.id===id);const list=o.absensi||[];
  if(!(o.survei&&o.survei.sudah)){toast('Catat "Survei Lokasi" dulu sebelum mulai');return}
  if(list.find(a=>a.masuk&&!a.keluar)){toast('Sudah absen masuk — Absen Keluar dulu');return}
  toast('Mengambil lokasi GPS…');let pos=null;try{pos=await getGPS();}catch(e){}
  let jarak=null,detail='tanpa GPS';
  if(pos&&o.lat&&o.lng){jarak=Math.round(haversine(pos.lat,pos.lng,o.lat,o.lng));detail=jarak>500?`⚠ jauh dari lokasi (~${(jarak/1000).toFixed(1)} km)`:`✓ di lokasi (±${jarak} m)`;}
  else if(pos)detail='GPS aktif (titik lokasi belum ditandai)';
  const hari=list.length+1;
  const baru=[...list,{hari,masuk:new Date().toISOString(),lat:pos?pos.lat:null,lng:pos?pos.lng:null,jarak}];
  const {error}=await sb.from('orders').update({absensi:baru,status:'DIKERJAKAN'}).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,`Absen masuk hari ${hari}`,detail);
  if(jarak!=null&&jarak>500)toast('⚠ Anda tampak jauh dari lokasi — tercatat');
  await refresh();openOrder(id);toast('🟢 Absen masuk tercatat');
}
async function absenKeluar(id){
  const o=ORDERS.find(x=>x.id===id);const list=(o.absensi||[]).slice();
  const idx=list.findIndex(a=>a.masuk&&!a.keluar);
  if(idx<0){toast('Belum absen masuk hari ini');return}
  list[idx]={...list[idx],keluar:new Date().toISOString()};
  const {error}=await sb.from('orders').update({absensi:list}).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,`Absen keluar hari ${list[idx].hari}`,'Hari kerja selesai');
  await refresh();openOrder(id);toast('🔴 Absen keluar tercatat');
}
async function hentikanHarian(id){
  const o=ORDERS.find(x=>x.id===id);const hp=hariPenuh(o);
  if(!confirm(`Hentikan & bayar ${hp} hari yang sudah dihadiri? Sisa dana dikembalikan ke Anda.`))return;
  await konfirmasi(id);
}
async function checkin(id){
  const o=ORDERS.find(x=>x.id===id);
  if(!(o.survei&&o.survei.sudah)){toast('Catat "Survei Lokasi" dulu sebelum mulai');return}
  toast('Mengambil lokasi GPS…');
  let pos=null; try{pos=await getGPS();}catch(e){}
  const upd={status:'DIKERJAKAN',checkin:true}; let detail;
  if(pos){
    upd.checkin_lat=pos.lat; upd.checkin_lng=pos.lng;
    if(o.lat&&o.lng){
      const d=Math.round(haversine(pos.lat,pos.lng,o.lat,o.lng)); upd.checkin_jarak=d;
      if(d>500){detail=`⚠ Check-in JAUH dari lokasi (~${(d/1000).toFixed(1)} km) — ditandai untuk peninjauan`;toast('⚠ Anda tampak jauh dari lokasi — tercatat');}
      else detail=`Terverifikasi GPS di lokasi (±${d} m)`;
    } else detail='Check-in GPS (titik lokasi belum ditandai pemilik)';
  } else detail='Check-in tanpa GPS (izin lokasi tidak aktif)';
  const {error}=await sb.from('orders').update(upd).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,'Check-in lokasi',detail);
  await refresh();openOrder(id);toast('📍 Check-in berhasil');
}
function getGPS(){return new Promise((res,rej)=>{if(!navigator.geolocation)return rej('no geo');navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),e=>rej(e),{enableHighAccuracy:true,timeout:10000,maximumAge:0});});}
function haversine(a,b,c,d){const R=6371000,r=x=>x*Math.PI/180;const dLat=r(c-a),dLon=r(d-b);const h=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));}
async function tandaiLokasi(){
  const b=$('gpsbtn');b.disabled=true;b.textContent='Mengambil lokasi…';
  try{const p=await getGPS();draft.lat=p.lat;draft.lng=p.lng;b.textContent='✓ Lokasi ditandai';b.classList.remove('btn-ghost');b.classList.add('btn-brass');}
  catch(e){b.disabled=false;b.textContent='📍 Coba lagi';toast('Tidak bisa ambil lokasi — pastikan izin lokasi aktif.');}
}

/* ====== RATING (dua arah) ====== */
function ratingBlock(o,amPemilik){
  if(o.status!=='SELESAI')return '';
  const sudah=amPemilik?o.rating:o.rating_pemilik, target=amPemilik?(o.tukang_nama||'tukang'):(o.pemilik_nama||'pemilik');
  if(sudah)return `<div class="card" style="padding:14px;text-align:center;margin-top:12px"><p style="font-size:12.5px;color:var(--muted)">Penilaian Anda untuk ${esc(target)}</p><div style="font-size:22px;color:var(--brass);margin-top:4px">${'★'.repeat(sudah)}${'☆'.repeat(5-sudah)}</div></div>`;
  return `<div class="card" style="padding:16px;text-align:center;margin-top:12px"><p style="font-size:13.5px;font-weight:700">Beri rating untuk ${esc(target)}</p>
    <div id="ratestars" style="font-size:34px;letter-spacing:6px;margin-top:8px">${[1,2,3,4,5].map(n=>`<span data-n="${n}" onclick="setStar(${n})" style="cursor:pointer;color:#ddd">★</span>`).join('')}</div>
    ${amPemilik?`<textarea id="ulasanteks" placeholder="Tulis ulasan singkat (opsional) — bisa tampil di Beranda" style="width:100%;margin-top:11px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;min-height:54px;font-family:inherit"></textarea>`:''}
    <button class="btn btn-primary" id="ratebtn" disabled style="margin-top:14px" onclick="kirimRating('${o.id}')">Kirim Penilaian</button></div>`;
}
let _star=0;
function setStar(n){_star=n;document.querySelectorAll('#ratestars span').forEach(s=>s.style.color=(+s.dataset.n<=n)?'#E89A2D':'#ddd');const b=$('ratebtn');if(b)b.disabled=false;}
async function kirimRating(id){
  if(!_star)return;
  const {error}=await sb.rpc('nilai_pesanan',{p_order:id,p_bintang:_star});
  if(error){toast('Gagal: '+error.message);return}
  const ul=$('ulasanteks');
  if(ul&&ul.value.trim()){try{await sb.rpc('ulas_pesanan',{p_order:id,p_teks:ul.value.trim()});}catch(e){}}
  _star=0;await refresh();openOrder(id);toast('Terima kasih atas penilaian Anda');

function fotoBtn(o,jenis){
  const url=jenis==='sebelum'?o.foto_sebelum_url:o.foto_sesudah_url;
  if(url)return `<div style="flex:1"><img src="${url}" onclick="window.open('${url}')" style="width:100%;height:92px;object-fit:cover;border-radius:11px;border:1px solid var(--line)"><div style="font-size:10.5px;color:var(--ok);text-align:center;margin-top:3px;font-weight:600">✓ ${jenis} · ketuk ganti</div><button onclick="pilihFoto('${o.id}','${jenis}')" style="display:none"></button></div>`;
  return `<button class="uploadbox" style="flex:1;border:1.5px dashed var(--line);border-radius:13px;padding:18px;background:#fff" onclick="pilihFoto('${o.id}','${jenis}')"><div style="font-size:22px">📷</div><div style="font-size:11.5px;font-weight:600;margin-top:3px">Foto ${jenis}</div></button>`;
}
function fotoView(o){
  const hasFoto=o.foto_sebelum_url||o.foto_sesudah_url, hasVid=o.video_sebelum_url||o.video_sesudah_url;
  if(!hasFoto&&!hasVid)return '';
  const cell=(url,lbl)=>`<div style="flex:1;text-align:center">${url?`<img src="${url}" onclick="window.open('${url}')" style="width:100%;height:110px;object-fit:cover;border-radius:12px;border:1px solid var(--line)">`:`<div style="height:110px;border-radius:12px;background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--muted)">—</div>`}<div style="font-size:11px;color:var(--muted);margin-top:3px">${lbl}</div></div>`;
  const vcell=(url,lbl)=>url?`<div style="flex:1;text-align:center"><video src="${url}" controls playsinline style="width:100%;height:140px;border-radius:12px;border:1px solid var(--line);background:#000"></video><div style="font-size:11px;color:var(--muted);margin-top:3px">🎥 ${lbl}</div></div>`:'<div style="flex:1"></div>';

  if(hasVid)h+=`<div style="display:flex;gap:10px;margin-top:10px">${vcell(o.video_sebelum_url,'Sebelum')}${vcell(o.video_sesudah_url,'Sesudah')}</div>`;

function pilihBukti(id){

  inp.onchange=()=>{if(inp.files&&inp.files[0])uploadBukti(id,inp.files[0]);inp.remove();};
  document.body.appendChild(inp);inp.click();
}
async function uploadBukti(id,file){

  }catch(e){toast('Gagal: '+(e.message||e))}

function pilihFoto(id,jenis){

async function uploadVideo(id,jenis,file){
  if(file.size>30*1024*1024){toast('⚠ Video terlalu besar (maks 30 MB). Rekam ±15 detik saja.');return}
  toast('Mengunggah video… tunggu sebentar');
  try{
    const ext=((file.name||'v').split('.').pop()||'mp4').toLowerCase();
    const path=`${id}/${jenis}-${Date.now()}.${ext}`;
    const {error:ue}=await sb.storage.from('bukti').upload(path,file,{upsert:true,contentType:file.type||'video/mp4'});
    if(ue)throw ue;
    const url=sb.storage.from('bukti').getPublicUrl(path).data.publicUrl;
    const upd=jenis==='sebelum'?{video_sebelum_url:url}:{video_sesudah_url:url};
    const {error}=await sb.from('orders').update(upd).eq('id',id);
    if(error)throw error;
    await addLog(id,'Video bukti diunggah',`Video ${jenis} ditambahkan`);
    await refresh();openOrder(id);toast('✅ Video '+jenis+' tersimpan');
  }catch(e){toast('Gagal unggah video: '+(e.message||e))}
}
function kompresFoto(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1000;let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>max){w=Math.round(w*max/h);h=max}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.6));
    };
    img.onerror=()=>rej('gambar gagal dimuat');img.src=url;
  });
}

function toggleKeahlian(nm,el){
  ME.keahlian=ME.keahlian||[];const i=ME.keahlian.indexOf(nm);
  if(i>=0){ME.keahlian.splice(i,1);el.style.background='#fff';el.style.color='#1b4d47';el.style.borderColor='var(--line)';}
  else{ME.keahlian.push(nm);el.style.background='var(--brand)';el.style.color='#fff';el.style.borderColor='var(--brand)';}
}
async function simpanKeahlian(){
  const {error}=await sb.from('profiles').update({keahlian:ME.keahlian||[]}).eq('id',ME.id);
  if(error){toast('Gagal: '+error.message);return}
  toast('✔ Keahlian disimpan');
}
async function setujuAturan(){
  if(!ME||!ME.id)return;
  const now=new Date().toISOString();
  const {error}=await sb.from('profiles').update({setuju_aturan:now}).eq('id',ME.id);
  if(error){toast('Gagal: '+error.message);return}
  ME.setuju_aturan=now;
  closeSheet();render();toast('✔ Persetujuan tercatat. Terima kasih.');
}

      <div style="flex:1;border-left:1px solid var(--line)"><div style="font-size:20px;font-weight:800;color:var(--brand)">${st.tukang||0}</div><div style="font-size:10.5px;color:var(--muted)">Tukang terverifikasi</div></div>
      <div style="flex:1;border-left:1px solid var(--line)"><div style="font-size:20px;font-weight:800;color:var(--brand)">⭐ ${st.rating||'5.0'}</div><div style="font-size:10.5px;color:var(--muted)">Rating</div></div></div>`;}

      else tb.innerHTML=`<div class="card" style="padding:18px;text-align:center;color:var(--muted)"><div style="font-size:24px">💬</div><p style="font-size:12.5px;margin-top:5px">Belum ada ulasan. Jadilah pelanggan pertama yang memberi penilaian!</p></div>`;
    }

  <div style="padding:0 20px 16px;font-size:13.5px;line-height:1.55;color:#2c4642">
    ${items.map(([h,b])=>`<div style="margin-bottom:13px"><div style="font-weight:800;color:var(--brand);margin-bottom:2px">${h}</div><div>${b}</div></div>`).join('')}
  </div>
  <div style="padding:0 20px 24px"><button class="btn btn-primary" onclick="closeSheet()">Tutup</button></div>`;}

  ['Hak Anda','Tukang terverifikasi, dana aman lewat escrow, pekerjaan bergaransi, serta perlindungan & dukungan admin bila ada masalah.'],

  const tk=(typeof ME!=='undefined')&&ME&&ME.role==='tukang';
  const items=tk?[
    ['1. Verifikasi dulu','Unggah KTP + selfie di Profil, tunggu disetujui admin. Setujui Aturan, isi Keahlian & Cara Pembayaran.'],

function openSheet(html){
  let ov=$('ov');
  if(!ov){ov=document.createElement('div');ov.id='ov';ov.style.cssText='position:fixed;inset:0;background:rgba(8,30,28,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center';ov.onclick=e=>{if(e.target===ov)closeSheet()};document.body.appendChild(ov)}
  ov.innerHTML=`<div style="background:var(--surface);width:100%;max-width:440px;max-height:92vh;border-radius:24px 24px 0 0;overflow-y:auto">${html}</div>`;
  document.body.style.overflow='hidden';
}
let _mapTimer=null,_map=null,_mTukang=null;
function loadLeaflet(){return new Promise((res,rej)=>{
  if(window.L)return res(window.L);
  if(!document.getElementById('leafcss')){const l=document.createElement('link');l.id='leafcss';l.rel='stylesheet';l.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(l);}
  const s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=()=>window.L?res(window.L):rej('gagal');s.onerror=()=>rej('gagal');document.head.appendChild(s);
});}
async function openPetaLangsung(orderId){
  let L;try{L=await loadLeaflet();}catch(e){toast('Gagal memuat peta — cek internet');return}
  const o=ORDERS.find(x=>x.id===orderId);if(!o)return;
  openSheet(`<div style="padding:16px 16px 8px"><h3 style="font-size:16px;font-weight:800;margin-bottom:8px">📍 Lokasi Tukang — Langsung</h3><div id="petamap" style="width:100%;height:60vh;border-radius:14px;overflow:hidden;background:#e8efed"></div><div id="petainfo" style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center"></div><button class="btn btn-ghost" style="margin-top:10px" onclick="closeSheet()">Tutup</button></div>`);
  setTimeout(()=>{
    try{
      const center=[o.tukang_lat||o.lat||-8.65,o.tukang_lng||o.lng||115.13];
      _map=L.map('petamap').setView(center,15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(_map);
      if(o.lat&&o.lng)L.marker([o.lat,o.lng]).addTo(_map).bindPopup('📍 Lokasi pekerjaan');
      if(o.tukang_lat&&o.tukang_lng)_mTukang=L.marker([o.tukang_lat,o.tukang_lng]).addTo(_map).bindPopup('🔧 Tukang');
      setTimeout(()=>_map&&_map.invalidateSize(),200);
      updatePetaInfo(o);
      _mapTimer=setInterval(()=>refreshPeta(orderId),10000);
    }catch(e){}
  },150);
}
async function refreshPeta(orderId){
  try{
    const {data}=await sb.from('orders').select('tukang_lat,tukang_lng,loc_updated,lat,lng').eq('id',orderId).maybeSingle();
    if(!data||!_map||!window.L)return;
    if(data.tukang_lat&&data.tukang_lng){const ll=[data.tukang_lat,data.tukang_lng];if(_mTukang)_mTukang.setLatLng(ll);else _mTukang=window.L.marker(ll).addTo(_map).bindPopup('🔧 Tukang');_map.panTo(ll);}
    updatePetaInfo(data);
  }catch(e){}
}
function updatePetaInfo(o){
  const el=$('petainfo');if(!el)return;
  let j='';if(o.lat&&o.lng&&o.tukang_lat&&o.tukang_lng)j='Sekitar '+fmtJarak(haversine(o.tukang_lat,o.tukang_lng,o.lat,o.lng))+' dari lokasi · ';
  el.innerHTML=o.loc_updated?(j+'diperbarui '+timeAgo(o.loc_updated)):'Menunggu lokasi tukang…';
}
function closeSheet(){if(_mapTimer){clearInterval(_mapTimer);_mapTimer=null;}if(_map){try{_map.remove();}catch(e){}_map=null;_mTukang=null;}const ov=$('ov');if(ov)ov.remove();document.body.style.overflow=''}
function emptyBox(ic,t,p){return `<div class="empty"><div class="ic">${ic}</div><h4 style="font-size:15px;margin-top:8px">${t}</h4>${p?`<p>${p}</p>`:''}</div>`}
function timeAgo(t){const d=(Date.now()-new Date(t).getTime())/1000;if(d<60)return'baru saja';if(d<3600)return Math.floor(d/60)+' mnt lalu';if(d<86400)return Math.floor(d/3600)+' jam lalu';return Math.floor(d/86400)+' hari lalu'}

sb.auth.onAuthStateChange((e,session)=>{if(e==='SIGNED_OUT'){ME=null;renderAuth()}});
boot();
