<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TukangKu Bali — Tukang Terpercaya #1 di Bali</title>
<meta name="description" content="Platform jasa tukang perbaikan rumah terpercaya di Bali. AI Vision analisis foto, cari tukang terdekat otomatis, escrow, garansi nyata."/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --p:#0F7B6C;--pd:#0A5C51;--pl:#14A896;--s:#1565C0;
  --acc:#FFB300;--ok:#2E7D32;--err:#C62828;--warn:#F57F17;
  --esc:#6A1B9A;--em:#B71C1C;
  --bg:#F0F7F6;--txt:#1A2E2C;--muted:#607D7A;--brd:#D0E8E4;
}
body{font-family:'Nunito',sans-serif;color:var(--txt);background:#fff;overflow-x:hidden;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 24px;border-radius:16px;font-weight:800;font-size:15px;font-family:'Nunito',sans-serif;cursor:pointer;border:none;transition:all .2s;text-decoration:none;justify-content:center;}
.btn:hover{transform:translateY(-2px);filter:brightness(1.07);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-p{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;}
.btn-ok{background:linear-gradient(135deg,var(--ok),#1B5E20);color:#fff;}
.btn-esc{background:linear-gradient(135deg,var(--esc),#4A148C);color:#fff;}
.btn-out{background:transparent;border:2px solid var(--p);color:var(--p);}
.btn-out:hover{background:var(--p);color:#fff;}
.btn-em{background:linear-gradient(135deg,var(--em),#7F0000);color:#fff;}
.btn-loc{background:linear-gradient(135deg,#1565C0,#0D47A1);color:#fff;}
.w100{width:100%;}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 4px 20px rgba(15,123,108,.08);border:1px solid var(--brd);}
.section{padding:72px 0;}
.container{max-width:1120px;margin:0 auto;padding:0 24px;}
.tc{text-align:center;}
.slbl{font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--p);margin-bottom:10px;}
.stitle{font-size:34px;font-weight:900;line-height:1.2;margin-bottom:14px;}
.ssub{font-size:16px;color:var(--muted);line-height:1.7;}
.lbl{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px;}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--brd);border-radius:13px;font-size:14px;font-family:'Nunito',sans-serif;color:var(--txt);outline:none;transition:.2s;background:#fff;box-sizing:border-box;}
.inp:focus{border-color:var(--p);box-shadow:0 0 0 4px rgba(15,123,108,.1);}
textarea.inp{resize:none;height:78px;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);}
.nav-in{max-width:1120px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--p),var(--pd));border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-txt{font-size:18px;font-weight:900;color:var(--txt);}
.logo-txt span{color:var(--p);}
.nav-links{display:flex;gap:24px;align-items:center;}
.nav-links a{font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;transition:.2s;}
.nav-links a:hover{color:var(--p);}

/* HERO */
.hero{min-height:100vh;background:linear-gradient(135deg,var(--pd) 0%,var(--p) 55%,var(--s) 100%);display:flex;align-items:center;padding-top:64px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}
.hero-in{max-width:1120px;margin:0 auto;padding:80px 24px;display:grid;grid-template-columns:1fr 1fr;gap:52px;align-items:center;}
.hero h1{font-size:48px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:16px;}
.hero h1 em{font-style:normal;color:#FFD54F;}
.hero p{font-size:16px;color:rgba(255,255,255,.82);line-height:1.7;margin-bottom:24px;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
.hero-stats{display:flex;gap:24px;}
.hero-stat strong{font-size:24px;font-weight:900;color:#fff;display:block;}
.hero-stat p{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;}
.hold-pill{display:inline-flex;align-items:center;gap:10px;background:rgba(255,179,0,.15);border:1.5px solid rgba(255,179,0,.4);border-radius:13px;padding:9px 15px;margin-bottom:18px;}
.ai-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:28px;padding:7px 14px;margin-bottom:18px;}

/* LOCATION BANNER */
.loc-banner{background:linear-gradient(135deg,#E3F2FD,#E8F5E9);border:2px solid #42A5F5;border-radius:18px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.loc-banner.detected{border-color:var(--ok);background:linear-gradient(135deg,#E8F5E9,#F1F8E9);}
.loc-banner.error{border-color:var(--err);background:linear-gradient(135deg,#FFEBEE,#FCE4EC);}
.loc-dot{width:10px;height:10px;border-radius:50%;background:#42A5F5;animation:locpulse 1.5s infinite;flex-shrink:0;}
.loc-dot.ok{background:var(--ok);}
.loc-dot.err{background:var(--err);animation:none;}
@keyframes locpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.4);}}

/* TUKANG TERDEKAT */
.tukang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:16px;}
.tukang-card{background:#fff;border-radius:18px;padding:16px;border:1.5px solid var(--brd);transition:.3s;position:relative;overflow:hidden;}
.tukang-card:hover{border-color:var(--p);transform:translateY(-3px);box-shadow:0 10px 28px rgba(15,123,108,.12);}
.tukang-card.nearest{border-color:var(--ok);background:linear-gradient(135deg,#E8F5E9,#fff);}
.tukang-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;flex-shrink:0;}
.tukang-badge{position:absolute;top:10px;right:10px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:8px;}
.tukang-badge.nearest-badge{background:#E8F5E9;color:var(--ok);}
.tukang-badge.online{background:#E3F2FD;color:var(--s);}
.tukang-badge.busy{background:#FFF3E0;color:var(--warn);}
.dist-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--brd);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:800;color:var(--p);}
.dist-pill.near{background:#E8F5E9;border-color:#A5D6A7;color:var(--ok);}
.skill-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px;}
.skill-chip{font-size:10px;font-weight:700;padding:2px 7px;background:var(--bg);border-radius:7px;color:var(--muted);}

/* MOCK */
.mock{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;overflow:hidden;}
.mock-bar{background:rgba(255,255,255,.1);padding:9px 13px;display:flex;align-items:center;gap:8px;}
.mock-dots{display:flex;gap:5px;}
.mock-dots span{width:8px;height:8px;border-radius:50%;display:block;}
.mock-url{flex:1;background:rgba(255,255,255,.1);border-radius:7px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.5);}
.mock-body{padding:13px;}
.mock-card{background:#fff;border-radius:13px;padding:11px;margin-bottom:9px;}
.mock-card:last-child{margin-bottom:0;}

/* GARANSI */
.g-section{background:linear-gradient(135deg,#FFF8F0,#FFF3E0);border-top:3px solid var(--acc);}
.g-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.07);}
.g-table th{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:12px 15px;text-align:left;font-size:12px;}
.g-table td{padding:12px 15px;font-size:12px;border-bottom:1px solid var(--brd);background:#fff;vertical-align:middle;}
.g-table tr:last-child td{border-bottom:none;}
.g-table tr:hover td{background:var(--bg);}
.g-pill{display:inline-flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--brd);border-radius:20px;padding:3px 10px;font-weight:800;font-size:11px;color:var(--p);}
.g-pill.sp{background:#FFF3E0;border-color:var(--acc);color:var(--warn);}

/* FLOW */
.flow{display:flex;align-items:center;overflow-x:auto;padding-bottom:6px;margin:28px 0;}
.flow-step{flex:1;min-width:110px;text-align:center;padding:14px 8px;background:#fff;border-radius:13px;margin:0 4px;border:1.5px solid var(--brd);}
.flow-step.hl{background:linear-gradient(135deg,#EDE7F6,#F3E5F5);border-color:var(--esc);}
.flow-step.ok{background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border-color:var(--ok);}
.flow-arrow{font-size:16px;color:var(--muted);flex-shrink:0;}
.flow-step .fi{font-size:24px;margin-bottom:5px;}
.flow-step h4{font-size:11px;font-weight:800;margin-bottom:2px;}
.flow-step p{font-size:10px;color:var(--muted);line-height:1.4;}

/* LAYANAN GRID */
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
.cat-tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--brd);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;background:#fff;color:var(--muted);}
.cat-tab.active,.cat-tab:hover{border-color:var(--p);background:var(--p);color:#fff;}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:13px;}
.svc-card{border-radius:16px;padding:18px 14px;cursor:pointer;transition:.3s;border:1.5px solid var(--brd);background:#fff;text-align:center;position:relative;}
.svc-card:hover{border-color:var(--p);transform:translateY(-3px);box-shadow:0 10px 28px rgba(15,123,108,.12);}
.svc-emoji{font-size:30px;margin-bottom:8px;display:block;}
.svc-card h3{font-size:13px;font-weight:800;margin-bottom:3px;line-height:1.3;}
.svc-card p{font-size:10px;color:var(--muted);line-height:1.4;}
.svc-price{font-size:11px;font-weight:800;color:var(--p);margin-top:5px;}
.svc-g{font-size:10px;font-weight:700;color:var(--warn);background:#FFF3E0;border-radius:7px;padding:2px 7px;display:inline-block;margin-top:3px;}
.svc-badge{position:absolute;top:8px;right:8px;font-size:9px;font-weight:800;padding:2px 6px;border-radius:8px;}
.svc-badge.new{background:#E3F2FD;color:var(--s);}
.svc-badge.hot{background:#FFEBEE;color:var(--em);}

/* ORDER SECTION */
.order-section{background:linear-gradient(135deg,var(--pd),var(--p));}
.form-wrap{background:#fff;border-radius:22px;padding:28px;max-width:740px;margin:0 auto;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.form-group{margin-bottom:14px;}

/* AI PHOTO ANALYZER */
.ai-analyzer{border:2px solid var(--acc);border-radius:18px;background:linear-gradient(135deg,#FFFDE7,#FFF8E1);overflow:hidden;margin-bottom:16px;}
.ai-analyzer-header{background:linear-gradient(135deg,#FF8F00,#E65100);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.ai-analyzer-header h3{font-size:14px;font-weight:900;color:#fff;margin:0;}
.ai-analyzer-header p{font-size:11px;color:rgba(255,255,255,.8);margin:0;}
.ai-upload-zone{padding:16px;border-bottom:1px solid rgba(255,179,0,.3);}
.ai-drop{border:2px dashed rgba(255,179,0,.5);border-radius:13px;padding:20px;text-align:center;cursor:pointer;transition:.2s;background:rgba(255,255,255,.6);}
.ai-drop:hover{border-color:var(--acc);background:rgba(255,255,255,.9);}
.ai-drop input{display:none;}
.ai-preview-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.ai-thumb-wrap{position:relative;display:inline-block;}
.ai-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;border:2px solid var(--acc);}
.ai-thumb-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;background:var(--err);border-radius:50%;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:800;}
.ai-result{padding:16px;display:none;}
.ai-result.show{display:block;}
.ai-result-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ai-scanning{display:none;padding:16px;text-align:center;}
.ai-scanning.show{display:block;}
.ai-scan-anim{font-size:36px;animation:scanpulse 1s infinite;}
@keyframes scanpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.1);}}
.price-breakdown{background:#fff;border-radius:13px;padding:14px;border:1px solid var(--brd);}
.price-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--brd);font-size:13px;}
.price-row:last-child{border-bottom:none;font-weight:900;font-size:15px;color:var(--p);}
.price-row .label{color:var(--muted);font-size:12px;}
.price-row .val{font-weight:700;}
.confidence-bar{background:var(--brd);border-radius:10px;height:6px;overflow:hidden;margin-top:4px;}
.confidence-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--ok),var(--pl));transition:width 1s;}
.fair-badge{display:inline-flex;align-items:center;gap:5px;background:#E8F5E9;border:1px solid #A5D6A7;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:800;color:var(--ok);margin-top:8px;}
.market-compare{background:var(--bg);border-radius:11px;padding:11px;margin-top:10px;font-size:12px;}
.market-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.market-row:last-child{margin-bottom:0;}
.ai-vision-badge{display:inline-flex;align-items:center;gap:5px;background:#E8EAF6;border:1px solid #7986CB;border-radius:10px;padding:4px 10px;font-size:10px;font-weight:800;color:#3949AB;margin-bottom:8px;}

/* STATS */
.stats-sec{background:linear-gradient(135deg,var(--pd),var(--s));}
.stat-item{text-align:center;padding:26px 16px;}
.stat-item strong{font-size:40px;font-weight:900;color:#fff;display:block;}
.stat-item span{font-size:12px;color:rgba(255,255,255,.7);}

/* TESTIMONI */
.testi-card{border-radius:16px;padding:20px;background:#fff;border:1px solid var(--brd);}
.stars{color:var(--acc);font-size:14px;margin-bottom:7px;}
.reviewer{display:flex;align-items:center;gap:10px;margin-top:11px;}
.rev-av{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;}

/* TUKANG JOIN */
.tukang-sec{background:linear-gradient(135deg,var(--s),#0D47A1);}
.t-benefit{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;}
.tb-icon{width:40px;height:40px;border-radius:13px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}

/* COVERAGE */
.area-pill{background:#fff;border:2px solid var(--brd);border-radius:28px;padding:6px 14px;font-size:12px;font-weight:700;transition:.2s;}
.area-pill:hover{border-color:var(--p);color:var(--p);}
.area-pill.hot{border-color:var(--acc);background:#FFF8E1;color:#E65100;}
.cov-map{background:linear-gradient(135deg,#E8F5E9,#E3F2FD);border-radius:16px;padding:26px;text-align:center;position:relative;overflow:hidden;min-height:220px;display:flex;align-items:center;justify-content:center;}
.cov-map::before{content:'🌴';font-size:150px;position:absolute;opacity:.07;right:-10px;bottom:-10px;}
.area-wrap{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;position:relative;z-index:1;}

/* FAQ */
.faq-item{border:1px solid var(--brd);border-radius:13px;overflow:hidden;margin-bottom:7px;}
.faq-q{width:100%;padding:14px 17px;background:#fff;border:none;text-align:left;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--txt);}
.faq-q:hover{background:var(--bg);}
.faq-a{padding:0 17px;max-height:0;overflow:hidden;transition:all .3s;font-size:13px;color:var(--muted);line-height:1.7;}
.faq-a.open{max-height:300px;padding:0 17px 13px;}

/* WA FLOAT */
.wa-float{position:fixed;bottom:26px;right:26px;z-index:150;}
.wa-btn{width:56px;height:56px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 8px 24px rgba(37,211,102,.4);text-decoration:none;animation:wapulse 2s infinite;}
@keyframes wapulse{0%,100%{box-shadow:0 8px 24px rgba(37,211,102,.4);}50%{box-shadow:0 8px 32px rgba(37,211,102,.7);}}
.wa-tip{position:absolute;right:64px;bottom:11px;background:var(--txt);color:#fff;padding:6px 11px;border-radius:9px;font-size:11px;font-weight:700;white-space:nowrap;opacity:0;transition:.2s;pointer-events:none;}
.wa-float:hover .wa-tip{opacity:1;}

/* MODALS */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);}
.modal-ov.show{display:flex;}
.modal{background:#fff;border-radius:22px;padding:28px;max-width:460px;width:100%;text-align:center;max-height:90vh;overflow-y:auto;}
.mitra-modal{max-width:580px;text-align:left;}
.mitra-modal .modal-header{text-align:center;margin-bottom:22px;}
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
.step-dot{width:7px;height:7px;border-radius:50%;background:var(--brd);transition:.3s;}
.step-dot.active{background:var(--p);width:22px;border-radius:4px;}
.step-panel{display:none;}
.step-panel.active{display:block;}
.upload-area{border:2px dashed var(--brd);border-radius:13px;padding:18px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg);}
.upload-area:hover{border-color:var(--p);background:#E8F5F3;}
.upload-area input{display:none;}
.skill-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px;}
.skill-tag{padding:5px 12px;border-radius:20px;border:1.5px solid var(--brd);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;background:#fff;}
.skill-tag.selected{border-color:var(--p);background:#E8F5F3;color:var(--p);}
.success-icon{width:68px;height:68px;background:linear-gradient(135deg,var(--ok),#1B5E20);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:30px;}

/* LOADING SPINNER */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

footer{background:var(--txt);padding:50px 0 26px;}
.footer-in{max-width:1120px;margin:0 auto;padding:0 24px;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;margin-bottom:32px;}
.footer-brand p{font-size:12px;color:rgba(255,255,255,.5);line-height:1.7;margin-top:9px;}
.footer-col h4{font-size:12px;font-weight:800;color:#fff;margin-bottom:12px;}
.footer-col a{display:block;font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;margin-bottom:6px;transition:.2s;}
.footer-col a:hover{color:#fff;}
.footer-bot{border-top:1px solid rgba(255,255,255,.1);padding-top:20px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:9px;}
.footer-bot p{font-size:11px;color:rgba(255,255,255,.4);}

@media(max-width:768px){
  .hero-in{grid-template-columns:1fr;}
  .hero h1{font-size:30px;}
  .mock,.nav-links{display:none;}
  .stitle{font-size:24px;}
  .form-row{grid-template-columns:1fr;}
  .flow{flex-direction:column;}
  .flow-arrow{transform:rotate(90deg);align-self:center;}
