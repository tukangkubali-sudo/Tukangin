<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0D5953">
<title>Tukangin — Jasa Tukang Bali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0D5953; --teal-d:#093E3A; --teal-l:#127A71;
  --brass:#E89A2D; --brass-d:#C97D17;
  --ink:#15211F; --muted:#6A7B77; --line:#E4E9E7;
  --surface:#FBFAF6; --card:#FFFFFF;
  --ok:#1E9E6A; --warn:#E89A2D; --bad:#D8473B;
  --hold:#B5760E; --hold-bg:#FDF4E3;
  --shadow:0 1px 3px rgba(13,89,83,.06),0 8px 24px rgba(13,89,83,.07);
  --r:16px;
  --font:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font);color:var(--ink);background:#E9ECEA;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased;
  display:flex;justify-content:center;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px}
img{display:block}

/* phone frame */
#phone{
  width:100%;max-width:440px;min-height:100vh;background:var(--surface);
  position:relative;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,.12);overflow:hidden;
}
@media(min-width:480px){#phone{margin:18px 0;min-height:calc(100vh - 36px);border-radius:30px}}

/* ---- top bar ---- */
.topbar{
  background:linear-gradient(135deg,var(--teal) 0%,var(--teal-d) 100%);
  color:#fff;padding:14px 18px 16px;position:sticky;top:0;z-index:30;
}
.topbar.flat{background:#fff;color:var(--ink);border-bottom:1px solid var(--line)}
.tb-row{display:flex;align-items:center;gap:12px}
.brandwrap{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.logo{width:34px;height:34px;border-radius:9px;background:var(--brass);display:grid;place-items:center;flex:none;box-shadow:0 2px 8px rgba(232,154,45,.4)}
.logo svg{width:20px;height:20px}
.brand b{font-weight:800;font-size:17px;letter-spacing:-.02em;display:block;line-height:1.1}
.brand small{font-size:11px;opacity:.85;font-weight:500}
.flat .brand small{color:var(--muted)}
.rolepill{font-size:11px;font-weight:700;background:rgba(255,255,255,.16);padding:5px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.flat .rolepill{background:var(--surface);border:1px solid var(--line)}
.demo-pill{font-size:10px;font-weight:700;letter-spacing:.04em;background:rgba(255,255,255,.14);padding:4px 9px;border-radius:7px}

.balance{margin-top:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.balance .lbl{font-size:11px;opacity:.85;font-weight:600}
.balance .amt{font-size:21px;font-weight:800;letter-spacing:-.02em;margin-top:1px}
.balance button{background:#fff;color:var(--teal-d);font-weight:700;font-size:13px;padding:9px 14px;border-radius:10px}

/* ---- scroll body ---- */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px 90px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:0}

.sec-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:18px 2px 10px}
.sec-title:first-child{margin-top:2px}

/* ---- cards ---- */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card+.card{margin-top:12px}

/* category grid */
.catgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.cat{background:var(--card);border-radius:14px;padding:12px 4px 9px;text-align:center;box-shadow:var(--shadow);transition:transform .12s}
.cat:active{transform:scale(.94)}
.cat .ic{font-size:22px;display:block;margin-bottom:5px}
.cat .nm{font-size:10.5px;font-weight:600;color:var(--ink);line-height:1.15}

/* hero post button */
.hero{
  background:linear-gradient(135deg,#127A71,#0D5953);color:#fff;border-radius:18px;
  padding:18px;box-shadow:0 8px 24px rgba(13,89,83,.22);position:relative;overflow:hidden;
}
.hero h3{font-size:17px;font-weight:800;letter-spacing:-.01em}
.hero p{font-size:12.5px;opacity:.9;margin-top:3px;max-width:230px}
.hero button{margin-top:13px;background:var(--brass);color:#3a2400;font-weight:800;font-size:14px;padding:11px 16px;border-radius:11px;display:inline-flex;align-items:center;gap:7px}
.hero .blob{position:absolute;right:-26px;top:-26px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero .blob2{position:absolute;right:18px;bottom:-40px;width:90px;height:90px;border-radius:50%;background:rgba(232,154,45,.18)}

/* order card */
.ocard{padding:14px}
.ocard .top{display:flex;gap:12px;align-items:flex-start}
.othumb{width:48px;height:48px;border-radius:12px;background:var(--surface);display:grid;place-items:center;font-size:24px;flex:none;border:1px solid var(--line)}
.ocard .ti{flex:1;min-width:0}
.ocard h4{font-size:15px;font-weight:700;letter-spacing:-.01em}
.ocard .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ocard .price{font-weight:800;font-size:15px;text-align:right;white-space:nowrap}
.ocard .price small{display:block;font-size:10px;color:var(--muted);font-weight:600}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;letter-spacing:.01em}
.b-draft{background:#EEF1F0;color:#5b6b68}
.b-wait{background:#FEF3E0;color:var(--hold)}
.b-hold{background:var(--hold-bg);color:var(--hold)}
.b-work{background:#E5F0FF;color:#2563c9}
.b-confirm{background:#EAF6F0;color:#15875a}
.b-done{background:#E7F5EC;color:var(--ok)}
.b-dispute{background:#FBE9E7;color:var(--bad)}

.divider{height:1px;background:var(--line);margin:13px 0}
.ocard .foot{display:flex;gap:9px}
.dot{width:3px;height:3px;border-radius:50%;background:var(--muted);opacity:.5}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:13px;font-weight:700;font-size:15px;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.985)}
.btn-primary{background:var(--teal);color:#fff}
.btn-brass{background:var(--brass);color:#3a2400}
.btn-ghost{background:var(--surface);color:var(--ink);border:1.5px solid var(--line)}
.btn-danger{background:#fff;color:var(--bad);border:1.5px solid #f3cdc9}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-sm{padding:10px 14px;font-size:13px;border-radius:10px;width:auto}
.btnrow{display:flex;gap:9px;margin-top:12px}
.btnrow .btn{flex:1}

/* tukang job card */
.jobcard{padding:14px}
.jdist{font-size:11px;font-weight:700;color:var(--teal);background:#E7F1EF;padding:3px 8px;border-radius:7px}
.tukmini{display:flex;align-items:center;gap:8px}
.tukav{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--brass),var(--brass-d));display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px;flex:none}
.stars{color:var(--brass);font-size:12px;font-weight:700}

/* ---- bottom nav ---- */
.botnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:7px 6px 9px;z-index:30}
.navb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px;color:var(--muted);font-size:10.5px;font-weight:600;position:relative}
.navb svg{width:23px;height:23px}
.navb.on{color:var(--teal)}
.navb .nbadge{position:absolute;top:0;right:50%;transform:translateX(16px);background:var(--bad);color:#fff;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 4px}

/* ---- sheet / overlay ---- */
.overlay{position:fixed;inset:0;background:rgba(8,30,28,.55);z-index:100;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.show{display:flex}
@media(min-width:480px){.overlay{align-items:center}}
.sheet{background:var(--surface);width:100%;max-width:440px;max-height:92vh;border-radius:24px 24px 0 0;overflow-y:auto;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@media(min-width:480px){.sheet{border-radius:24px;max-height:88vh}}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
.sheet-hd{position:sticky;top:0;background:var(--surface);padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);z-index:5}
.sheet-hd h3{font-size:17px;font-weight:800;letter-spacing:-.01em}
.xbtn{width:32px;height:32px;border-radius:9px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:18px;color:var(--muted)}
.sheet-bd{padding:16px 18px 24px}

.grip{width:38px;height:4px;border-radius:3px;background:var(--line);margin:8px auto 0}

/* form */
.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;color:var(--ink)}
.field .hint{font-size:11.5px;color:var(--muted);font-weight:500}
.input,textarea.input,select.input{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;color:var(--ink);outline:none;transition:border .15s}
.input:focus{border-color:var(--teal)}
textarea.input{resize:vertical;min-height:80px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 13px;border-radius:10px;background:#fff;border:1.5px solid var(--line);font-size:13px;font-weight:600;color:var(--muted)}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}

.uploadbox{border:1.5px dashed var(--line);border-radius:13px;padding:22px;text-align:center;background:#fff;color:var(--muted)}
.uploadbox .ic{font-size:26px}
.uploadbox span{display:block;font-size:12.5px;font-weight:600;margin-top:4px}
.thumb-prev{width:100%;height:150px;object-fit:cover;border-radius:13px;border:1px solid var(--line)}

/* price estimate box */
.estbox{background:linear-gradient(135deg,#FDF4E3,#FBEAC8);border:1px solid #f0dca8;border-radius:14px;padding:14px}
.estbox .lab{font-size:11px;font-weight:700;color:var(--brass-d);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.estbox .rng{font-size:21px;font-weight:800;color:#5a3d05;margin-top:3px;letter-spacing:-.02em}
.estbox .note{font-size:11px;color:#8a6a2a;margin-top:4px}

/* fee breakdown */
.fee{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px}
.feerow{display:flex;justify-content:space-between;font-size:13.5px;padding:5px 0}
.feerow.tot{border-top:1.5px dashed var(--line);margin-top:6px;padding-top:11px;font-weight:800;font-size:16px}
.feerow .sub{color:var(--muted);font-size:11.5px}

/* escrow tracker (signature) */
.escrow-banner{background:linear-gradient(135deg,#093E3A,#0D5953);border-radius:16px;padding:16px;color:#fff;position:relative;overflow:hidden}
.escrow-banner .lk{position:absolute;right:-10px;bottom:-14px;font-size:90px;opacity:.08}
.escrow-banner .st{font-size:11px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:.05em}
.escrow-banner .amt{font-size:26px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
.escrow-banner .sub{font-size:12px;opacity:.9;margin-top:5px;max-width:250px}

.tracker{margin-top:6px}
.tstep{display:flex;gap:13px;position:relative;padding-bottom:18px}
.tstep:last-child{padding-bottom:0}
.tstep .line{position:absolute;left:13px;top:26px;bottom:-2px;width:2px;background:var(--line)}
.tstep.done .line{background:var(--teal)}
.tstep .node{width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid var(--line);display:grid;place-items:center;flex:none;z-index:1;font-size:12px;color:var(--muted)}
.tstep.done .node{background:var(--teal);border-color:var(--teal);color:#fff}
.tstep.active .node{background:#fff;border-color:var(--teal);color:var(--teal);box-shadow:0 0 0 4px rgba(13,89,83,.12)}
.tstep .txt h5{font-size:14px;font-weight:700}
.tstep .txt p{font-size:12px;color:var(--muted);margin-top:1px}
.tstep.active .txt h5{color:var(--teal)}

/* OTP code card */
.otpcard{background:#fff;border:2px dashed var(--brass);border-radius:16px;padding:16px;text-align:center}
.otpcard .lab{font-size:11.5px;font-weight:700;color:var(--brass-d);text-transform:uppercase;letter-spacing:.05em}
.otpcard .code{font-size:38px;font-weight:800;letter-spacing:.18em;color:var(--ink);margin:6px 0 2px;font-variant-numeric:tabular-nums}
.otpcard .note{font-size:11.5px;color:var(--muted);line-height:1.4}
.otp-inputs{display:flex;gap:10px;justify-content:center;margin:8px 0}
.otp-inputs input{width:52px;height:60px;text-align:center;font-size:26px;font-weight:800;border:1.5px solid var(--line);border-radius:13px;background:#fff;outline:none}
.otp-inputs input:focus{border-color:var(--teal)}

/* chat */
.chatbox{background:#fff;border-radius:14px;border:1px solid var(--line);overflow:hidden}
.chat-warn{background:var(--hold-bg);color:var(--hold);font-size:11px;font-weight:600;padding:8px 12px;display:flex;gap:7px;align-items:center;border-bottom:1px solid #f0dca8}
.msgs{padding:12px;display:flex;flex-direction:column;gap:8px;max-height:200px;overflow-y:auto}
.msg{max-width:78%;padding:9px 12px;border-radius:14px;font-size:13.5px;line-height:1.35}
.msg.me{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px}
.chat-in{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
.chat-in input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:10px 14px;outline:none}
.chat-in button{width:42px;height:42px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;flex:none}

/* audit log */
.logitem{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.logitem:last-child{border-bottom:none}
.logitem .ldot{width:9px;height:9px;border-radius:50%;background:var(--teal);margin-top:5px;flex:none}
.logitem .lc{flex:1}
.logitem h6{font-size:13px;font-weight:700}
.logitem p{font-size:11.5px;color:var(--muted);margin-top:1px}
.logitem .hash{font-size:9.5px;color:#b3beba;font-family:ui-monospace,monospace;margin-top:2px}

/* profile */
.profhd{display:flex;align-items:center;gap:14px}
.profav{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,var(--brass),var(--brass-d));display:grid;place-items:center;color:#fff;font-weight:800;font-size:26px}
.kyc{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ok);background:#E7F5EC;padding:3px 9px;border-radius:7px;margin-top:5px}
.statgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
.statbox{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px;text-align:center}
.statbox .n{font-size:20px;font-weight:800;letter-spacing:-.02em}
.statbox .l{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:1px}

/* misc */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .ic{font-size:46px;opacity:.5}
.empty p{font-size:13.5px;margin-top:10px;max-width:240px;margin-inline:auto}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:.28s;box-shadow:0 8px 30px rgba(0,0,0,.3);max-width:380px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.infoline{display:flex;gap:8px;font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;align-items:flex-start}
.infoline b{color:var(--ink)}
.countdown{font-variant-numeric:tabular-nums;font-weight:800;color:var(--hold)}
.switch-role{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px;gap:3px}
.switch-role button{flex:1;padding:9px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--muted)}
.switch-role button.on{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.guarantee{display:flex;gap:9px;align-items:center;background:#E7F1EF;border-radius:11px;padding:11px 12px}
.guarantee .g-ic{font-size:18px}
.guarantee p{font-size:11.5px;color:var(--teal-d);font-weight:600;line-height:1.35}
</style>
</head>
<body>
<div id="phone">
  <div id="top"></div>
  <div class="scroll" id="scroll"></div>
  <div id="nav"></div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeSheet()">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   TUKANGIN — prototip siap-publish (escrow + anti-curang)
   Catatan integrasi nyata:
   - Escrow uang asli WAJIB lewat PJP berlisensi (Xendit/Midtrans/Doku)
     sesuai aturan Bank Indonesia. Fungsi bayar() di sini = simulasi
     status escrow; titik colok Xendit ditandai // <== XENDIT.
   - Persistensi & auth: ganti store.* dengan Supabase. // <== SUPABASE
   ============================================================ */

/* ---------- penyimpanan aman (localStorage + fallback memori) ---------- */
const mem={};
const store={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):(k in mem?mem[k]:null)}catch(e){return k in mem?mem[k]:null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){mem[k]=v}}
};

/* ---------- util ---------- */
const rp=n=>'Rp'+Math.round(n).toLocaleString('id-ID');
const $=id=>document.getElementById(id);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid=()=>Math.random().toString(36).slice(2,8);
const otp=()=>String(Math.floor(1000+Math.random()*9000));
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400)}

/* ---------- AI pricing endpoint ----------
   Di preview Claude.ai, endpoint Anthropic langsung jalan.
   Untuk PRODUKSI saat di-host sendiri: ganti ke Cloudflare Worker Anda
   yang menyimpan API key (jangan taruh key di sisi klien). */
const AI_ENDPOINT="https://api.anthropic.com/v1/messages"; // <== ganti ke Worker Anda di produksi

/* ---------- biaya platform (transparan) ---------- */
const FEE={layanan:0.05, komisi:0.06}; // pemilik +5% (biaya layanan & proteksi) ; tukang -6% (komisi)
function hitungBiaya(harga){
  const layanan=Math.round(harga*FEE.layanan);
  const komisi=Math.round(harga*FEE.komisi);
  return {harga, layanan, komisi, escrow:harga+layanan, payout:harga-komisi};
}

/* ---------- kategori ---------- */
const KAT=[
 {id:'listrik',nm:'Listrik',ic:'⚡'},{id:'pipa',nm:'Pipa/Ledeng',ic:'🔧'},
 {id:'ac',nm:'Servis AC',ic:'❄️'},{id:'las',nm:'Las/Pagar',ic:'🔥'},
 {id:'cat',nm:'Cat',ic:'🎨'},{id:'bocor',nm:'Atap Bocor',ic:'🏠'},
 {id:'kunci',nm:'Kunci',ic:'🔑'},{id:'kayu',nm:'Kayu/Mebel',ic:'🪚'},
 {id:'pompa',nm:'Pompa Air',ic:'💧'},{id:'umum',nm:'Lainnya',ic:'🛠️'},
];
const katOf=id=>KAT.find(k=>k.id===id)||KAT[9];

/* ---------- status meta ---------- */
const ST={
 DRAFT:{lbl:'Draft',cls:'b-draft'},
 MENUNGGU_DANA:{lbl:'Menunggu Pembayaran',cls:'b-wait'},
 DANA_DITAHAN:{lbl:'Dana Ditahan',cls:'b-hold'},
 DIKERJAKAN:{lbl:'Dikerjakan',cls:'b-work'},
 MENUNGGU_KONFIRMASI:{lbl:'Menunggu Konfirmasi',cls:'b-confirm'},
 SELESAI:{lbl:'Selesai',cls:'b-done'},

function seedOrder(kat,judul,desk,harga,lokasi,tukangId,status){
  const b=hitungBiaya(harga);
  const o={
    id:uid(),kat,judul,desk,harga,lokasi,jarakKm:(Math.random()*3+0.5).toFixed(1),
    pemilik:'Budi Santoso',tukangId,status,kodeSelesai:otp(),
    biaya:b, checkin:status==='DIKERJAKAN',
    fotoSebelum:status==='DIKERJAKAN', fotoSesudah:false,
    dibuat:Date.now()-86400000, autoRelease:null,
    chat:[{me:false,t:'Siap pak, saya berangkat sekarang nggih.'}],
    riwayat:[]
  };
  logAdd(o,'Pesanan dibuat','Pemilik membuat pesanan '+katOf(kat).nm);
  if(tukangId){logAdd(o,'Tukang menerima',ME_TUKANG.nm+' menerima pekerjaan');logAdd(o,'Dana masuk escrow',rp(b.escrow)+' ditahan sistem');}
  if(status==='DIKERJAKAN')logAdd(o,'Check-in GPS','Tukang tiba di lokasi (jarak 18m)');
  return o;
}

/* ---------- audit log (kesan tamper-evident: rantai hash sederhana) ---------- */
function logAdd(o,judul,detail){
  const prev=o.riwayat.length?o.riwayat[o.riwayat.length-1].hash:'0000';
  const raw=prev+judul+detail+o.riwayat.length;
  let h=0;for(let i=0;i<raw.length;i++){h=(h*31+raw.charCodeAt(i))>>>0}
  o.riwayat.push({judul,detail,t:Date.now(),hash:('00000000'+h.toString(16)).slice(-8)});
}

function tracker(o){
  const order=['MENUNGGU_DANA','DANA_DITAHAN','DIKERJAKAN','MENUNGGU_KONFIRMASI','SELESAI'];
  const steps=[
    {k:'MENUNGGU_DANA',h:'Pesanan dibuat',p:'Detail & lokasi tercatat'},
    {k:'DANA_DITAHAN',h:'Dana masuk escrow',p:'Uang ditahan sistem 🔒'},
    {k:'DIKERJAKAN',h:'Tukang check-in GPS',p:'Diverifikasi di lokasi'},
    {k:'MENUNGGU_KONFIRMASI',h:'Pekerjaan + foto bukti',p:'Foto sebelum & sesudah'},
    {k:'SELESAI',h:'Dana dicairkan',p:'Diteruskan ke tukang'},
  ];
  let cur=o.status==='SENGKETA'?3:order.indexOf(o.status);
  return `<div class="tracker">${steps.map((s,i)=>{
    const done=i<cur, active=i===cur;
    return `<div class="tstep ${done?'done':''} ${active?'active':''}">
      ${i<steps.length-1?'<div class="line"></div>':''}
      <div class="node">${done?'✓':(active?'●':i+1)}</div>
      <div class="txt"><h5>${s.h}</h5><p>${s.p}</p></div></div>`}).join('')}</div>`;
}

async function estimasiAI(){
  const d=S.draft, box=$('estbox'), btn=$('aibtn');
  if((d.desk||'').trim().length<6){toast('Isi deskripsi dulu agar AI bisa menaksir');return}

  const f=$('f_harga');
  if(f){S.draft.harga=String(h.rekomendasi);f.value=rp(h.rekomendasi)}
  S.draft.hargaAI=h.rekomendasi;
  if(btn){btn.disabled=false;btn.textContent='✨ Taksir Ulang dengan AI'}
}

async function taksirHarga(kat,desk){
  const katNm=katOf(kat).nm;
  const prompt=`Anda penaksir harga JASA tukang di Bali, Indonesia. Taksir hanya UPAH/JASA tenaga (belum termasuk material besar) untuk pekerjaan kecil-menengah rumah tangga.
Kategori: ${katNm}
Deskripsi dari pelanggan: "${desk}"
Pertimbangkan tarif wajar tukang harian/borongan kecil di Bali (Canggu/Seminyak/Kerobokan).
Balas HANYA JSON, tanpa teks lain, tanpa markdown:
{"min":<rupiah_angka>,"max":<rupiah_angka>,"rekomendasi":<rupiah_angka>,"alasan":"<maks 12 kata>","keyakinan":"tinggi|sedang|rendah"}`;
  try{
    const res=await fetch(AI_ENDPOINT,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    const txt=(data.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
    const j=JSON.parse(txt);
    if(typeof j.min==='number'&&typeof j.max==='number'){
      return {ai:true,min:j.min,max:j.max,rekomendasi:j.rekomendasi||Math.round((j.min+j.max)/2),alasan:j.alasan||'Taksiran AI',keyakinan:j.keyakinan||'sedang'};
    }
    throw new Error('format');
  }catch(e){
    return taksirLokal(kat,desk); // fallback offline (saat di-host tanpa Worker / jaringan mati)
  }
}

function taksirLokal(kat,desk){
  const base={listrik:[150000,400000],pipa:[150000,450000],ac:[200000,500000],las:[300000,900000],cat:[400000,1500000],bocor:[250000,800000],kunci:[100000,300000],kayu:[200000,700000],pompa:[200000,600000],umum:[150000,500000]};
  let [lo,hi]=base[kat]||base.umum;
  const t=(desk||'').toLowerCase();
  let f=1;
  if(/ganti|pasang baru|total|semua|beberapa|banyak|besar|parah/.test(t))f+=0.4;
  if(/cek|kecil|satu|sedikit|ringan|mudah/.test(t))f-=0.25;
  f=Math.max(0.7,Math.min(1.6,f));
  lo=Math.round(lo*f/10000)*10000; hi=Math.round(hi*f/10000)*10000;
  return {ai:false,min:lo,max:hi,rekomendasi:Math.round((lo+hi)/2/10000)*10000,alasan:'Estimasi pola kategori',keyakinan:'sedang'};
}

const ALASAN_TUKANG=['Ternyata lebih mudah dari perkiraan','Ada pekerjaan tambahan','Butuh material lebih banyak','Lebih rumit dari perkiraan'];
const ALASAN_PEMILIK=['Lingkup saya tambah','Sebagian saya kerjakan sendiri','Sesuai kondisi di lapangan'];

function sheetSesuaikan(id,oleh){
  const o=S.orders.find(x=>x.id===id);
  const alasan = oleh==='tukang'?ALASAN_TUKANG:ALASAN_PEMILIK;
  S._usul={harga:o.harga,alasan:alasan[0]};
  openSheet(`<div class="grip"></div><div class="sheet-hd"><h3>Sesuaikan Harga</h3><button class="xbtn" onclick="closeSheet()">✕</button></div>
    <div class="sheet-bd">
      <div class="infoline" style="margin-bottom:14px">🤝 <span>Usulan ini <b>tidak berlaku otomatis</b>. Harga hanya berubah jika ${oleh==='tukang'?'pemilik':'tukang'} menyetujui.</span></div>
      <div class="fee" style="margin-bottom:14px"><div class="feerow"><span>Harga saat ini</span><span>${rp(o.harga)}</span></div></div>
      <div class="field"><label>Alasan penyesuaian</label>
        <div class="chips" id="alasanchips" style="flex-direction:column;align-items:stretch">
          ${alasan.map((a,i)=>`<button class="chip ${i===0?'on':''}" style="text-align:left" onclick="pickAlasan(this,'${esc(a)}')">${a}</button>`).join('')}
        </div></div>
      <div class="field"><label>Harga baru yang diusulkan</label>
        <input class="input" id="u_harga" inputmode="numeric" value="${rp(o.harga)}" oninput="S._usul.harga=+this.value.replace(/\\D/g,'')||0;this.value=S._usul.harga?rp(S._usul.harga):'';previewUsul('${id}')"></div>
      <div class="estbox" id="u_prev" style="margin-bottom:14px"></div>
      <button class="btn btn-primary" onclick="ajukanUsulan('${id}','${oleh}')">Kirim Usulan ke ${oleh==='tukang'?'Pemilik':'Tukang'}</button>
    </div>`);
  previewUsul(id);
}
function pickAlasan(el,a){document.querySelectorAll('#alasanchips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');S._usul.alasan=a}
function previewUsul(id){
  const o=S.orders.find(x=>x.id===id), box=$('u_prev'); if(!box)return;
  const baru=hitungBiaya(S._usul.harga||0);
  const selisih=(S._usul.harga||0)-o.harga;
  const turun=selisih<0;
  box.style.background=turun?'linear-gradient(135deg,#E7F5EC,#d7efe0)':'linear-gradient(135deg,#FDF4E3,#FBEAC8)';
  box.style.borderColor=turun?'#bfe0ca':'#f0dca8';
  box.innerHTML=`<div class="lab" style="color:${turun?'#15875a':'var(--brass-d)'}">${selisih===0?'Tidak ada perubahan':(turun?'⬇ Harga turun':'⬆ Harga naik')} ${selisih?rp(Math.abs(selisih)):''}</div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px"><span>Tukang terima bersih</span><b>${rp(baru.payout)}</b></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-top:3px"><span>Total escrow pemilik</span><b>${rp(baru.escrow)}</b></div>
    <div class="note" style="margin-top:6px">${turun?'Selisih dikembalikan ke pemilik.':(selisih>0?'Pemilik menambah selisih ke escrow saat menyetujui.':'')}</div>`;
}
function ajukanUsulan(id,oleh){
  const o=S.orders.find(x=>x.id===id);
  const baru=S._usul.harga||0;
  if(baru<50000){toast('Masukkan harga yang wajar');return}
  if(baru===o.harga){toast('Harga belum berubah');return}
  o.usulan={oleh,hargaBaru:baru,alasan:S._usul.alasan,t:Date.now()};
  logAdd(o,'Usulan penyesuaian harga',`${oleh==='tukang'?'Tukang':'Pemilik'} usul ${rp(o.harga)} → ${rp(baru)} (${S._usul.alasan})`);
  closeSheet();render();
  toast(`Usulan dikirim. Menunggu persetujuan ${oleh==='tukang'?'pemilik':'tukang'}.`);
}
function setujuUsulan(id){
  const o=S.orders.find(x=>x.id===id), u=o.usulan, lama=o.harga;
  const naik=u.hargaBaru>lama, selisih=Math.abs(u.hargaBaru-lama);
  o.harga=u.hargaBaru; o.biaya=hitungBiaya(o.harga);            // <== XENDIT: jika naik, buat invoice top-up; jika turun, refund partial
  logAdd(o,'Penyesuaian harga disetujui',`${rp(lama)} → ${rp(u.hargaBaru)} disepakati kedua pihak`);
  logAdd(o, naik?'Top-up escrow':'Refund selisih', `${rp(selisih)} ${naik?'ditambahkan pemilik ke escrow':'dikembalikan ke pemilik'}`);
  o.usulan=null; render();
  toast(naik?'Disetujui — pemilik menambah selisih ke escrow':'Disetujui — selisih dikembalikan ke pemilik');
}
function tolakUsulan(id){const o=S.orders.find(x=>x.id===id);logAdd(o,'Usulan penyesuaian ditolak','Harga tetap '+rp(o.harga));o.usulan=null;render();toast('Usulan ditolak. Harga tetap.')}
function batalUsulan(id){const o=S.orders.find(x=>x.id===id);o.usulan=null;logAdd(o,'Usulan dibatalkan','Usulan penyesuaian ditarik');render();toast('Usulan dibatalkan')}

/* render bagian penyesuaian harga di detail; role = sudut pandang yang melihat */
function usulanSection(o,role){
  if(!['DANA_DITAHAN','DIKERJAKAN'].includes(o.status))return '';
  if(o.usulan)return usulanCard(o,role);
  return `<button class="btn btn-ghost" style="margin-top:12px" onclick="sheetSesuaikan('${o.id}','${role}')">✎ Usulkan Penyesuaian Harga</button>`;
}
function usulanCard(o,role){
  const u=o.usulan, turun=u.hargaBaru<o.harga, selisih=Math.abs(u.hargaBaru-o.harga);
  const baru=hitungBiaya(u.hargaBaru);
  const mine=u.oleh===role;
  if(mine){
    return `<div class="card" style="padding:16px;margin-top:12px;border:1.5px solid var(--brass)">
      <div class="badge b-wait" style="font-size:11px">⏳ Menunggu persetujuan ${role==='tukang'?'pemilik':'tukang'}</div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:15px;font-weight:700">
        <span style="color:var(--muted);text-decoration:line-through">${rp(o.harga)}</span> → <span>${rp(u.hargaBaru)}</span>
        <span class="badge ${turun?'b-done':'b-hold'}" style="margin-left:auto">${turun?'⬇':'⬆'} ${rp(selisih)}</span></div>
      <p style="font-size:12px;color:var(--muted);margin-top:6px">Alasan Anda: ${esc(u.alasan)}</p>
      <button class="btn btn-danger" style="margin-top:12px" onclick="batalUsulan('${o.id}')">Batalkan Usulan</button></div>`;
  }
  return `<div class="card" style="padding:16px;margin-top:12px;border:1.5px solid var(--brass)">
    <h5 style="font-size:14px;font-weight:800">${u.oleh==='tukang'?'Tukang':'Pemilik'} mengusulkan harga baru</h5>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;font-size:17px;font-weight:800">
      <span style="color:var(--muted);text-decoration:line-through;font-size:14px">${rp(o.harga)}</span> →
      <span style="color:${turun?'var(--ok)':'var(--hold)'}">${rp(u.hargaBaru)}</span>
      <span class="badge ${turun?'b-done':'b-hold'}" style="margin-left:auto">${turun?'⬇ turun':'⬆ naik'} ${rp(selisih)}</span></div>
    <p style="font-size:12.5px;color:#46605c;margin-top:8px">"${esc(u.alasan)}"</p>
    <div class="divider"></div>
    <div class="feerow" style="font-size:13px"><span>${role==='tukang'?'Anda terima bersih':'Total escrow Anda'}</span><b>${role==='tukang'?rp(baru.payout):rp(baru.escrow)}</b></div>
    ${turun?'<p style="font-size:11.5px;color:var(--ok);margin-top:4px">✓ Selisih dikembalikan ke pemilik.</p>':`<p style="font-size:11.5px;color:var(--hold);margin-top:4px">Pemilik menambah ${rp(selisih)} ke escrow.</p>`}
    <div class="btnrow"><button class="btn btn-danger" onclick="tolakUsulan('${o.id}')">Tolak</button>
      <button class="btn btn-primary" onclick="setujuUsulan('${o.id}')">Setuju</button></div></div>`;
}

/* ---- tukang: ambil, checkin, foto, kode ---- */
function ambilKerja(id){
  const o=S.orders.find(x=>x.id===id);
  o.tukangId=ME_TUKANG.id;
  // Di alur nyata: tukang ambil -> pelanggan diminta bayar. Untuk demo, tandai menunggu dana dr pemilik.
  logAdd(o,'Tukang ambil pekerjaan',ME_TUKANG.nm+' siap mengerjakan');
  S.tab='aktif';S.view={name:'detail',id};render();
  toast('Pekerjaan diambil. Menunggu pelanggan bayar ke escrow.');
}
function checkinGPS(id){
  const o=S.orders.find(x=>x.id===id);
  o.status='DIKERJAKAN';o.checkin=true;
  logAdd(o,'Check-in GPS','Tukang terverifikasi di lokasi (jarak 12m)');
  render();toast('📍 Check-in berhasil — selamat bekerja');
}
function uploadFoto(id,jenis){
  const o=S.orders.find(x=>x.id===id);
  if(jenis==='sebelum')o.fotoSebelum=true;else o.fotoSesudah=true;
  logAdd(o,'Foto bukti diunggah','Foto '+jenis+' ditambahkan');
  toast('Foto '+jenis+' tersimpan');render();
}
function sheetInputKode(id){
  openSheet(`<div class="grip"></div><div class="sheet-hd"><h3>Kode Selesai</h3><button class="xbtn" onclick="closeSheet()">✕</button></div>
    <div class="sheet-bd" style="text-align:center">
      <div style="font-size:34px">🔑</div>
      <p style="font-size:13.5px;color:var(--muted);margin:8px 0 16px">Minta <b>kode 4 digit</b> ke pelanggan. Mereka memberi kode hanya jika puas — ini bukti pekerjaan benar selesai.</p>
      <div class="otp-inputs" id="otpwrap">
        ${[0,1,2,3].map(i=>`<input inputmode="numeric" maxlength="1" data-i="${i}" oninput="otpNext(this,${i},'${id}')">`).join('')}
      </div>
      <p id="otperr" style="color:var(--bad);font-size:12.5px;font-weight:600;height:16px"></p>
      <button class="btn btn-primary" id="otpbtn" disabled onclick="cekKode('${id}')" style="margin-top:8px">Selesaikan Pekerjaan</button>
    </div>`);
  setTimeout(()=>document.querySelector('#otpwrap input')?.focus(),250);
}
function otpNext(el,i,id){
  el.value=el.value.replace(/\D/g,'');
  if(el.value&&i<3)document.querySelector(`#otpwrap input[data-i="${i+1}"]`).focus();
  const all=[...document.querySelectorAll('#otpwrap input')].map(x=>x.value).join('');
  $('otpbtn').disabled=all.length!==4;
}
function cekKode(id){
  const o=S.orders.find(x=>x.id===id);
  const val=[...document.querySelectorAll('#otpwrap input')].map(x=>x.value).join('');
  if(val!==o.kodeSelesai){$('otperr').textContent='Kode salah. Pastikan dari pelanggan.';logAdd(o,'Kode salah dimasukkan','Percobaan kode tidak cocok');return}
  o.status='MENUNGGU_KONFIRMASI';
  o.autoRelease=Date.now()+24*3600*1000;
  logAdd(o,'Kode selesai benar','Pekerjaan diselesaikan, menunggu konfirmasi pemilik');
  closeSheet();render();toast('✅ Berhasil! Menunggu konfirmasi pelanggan.');
}

/* ---- tarik saldo ---- */
function sheetTarik(){
  openSheet(`<div class="grip"></div><div class="sheet-hd"><h3>Tarik Saldo</h3><button class="xbtn" onclick="closeSheet()">✕</button></div>
    <div class="sheet-bd">
      <div class="estbox" style="background:linear-gradient(135deg,#E7F1EF,#dfeeeb);border-color:#bfe0da">
        <div class="lab" style="color:var(--teal-d)">Saldo tersedia</div>
        <div class="rng" style="color:var(--teal-d)">${rp(S.saldoTukang)}</div></div>
      <div class="field" style="margin-top:16px"><label>Rekening tujuan</label>
        <select class="input"><option>BCA •••• 4821 — Komang Arta</option><option>Mandiri •••• 9930</option></select></div>
      <div class="field"><label>Jumlah tarik</label><input class="input" inputmode="numeric" value="${rp(S.saldoTukang)}"></div>
      <div class="infoline" style="margin-bottom:14px">⏱️ <span>Dana masuk rekening maks. 1×24 jam. Pencairan diproses lewat Xendit Disbursement.</span></div>
      <button class="btn btn-primary" onclick="closeSheet();toast('Penarikan diproses ke bank Anda')">Tarik Sekarang</button>
    </div>`);
}

/* ---- chat ---- */
function kirimChat(id,asPemilik){
  const inp=$('chatin');if(!inp||!inp.value.trim())return;
  const o=S.orders.find(x=>x.id===id);
  o.chat.push({me:asPemilik,t:inp.value.trim()});
  render();
  setTimeout(()=>{const m=$('msgs');if(m)m.scrollTop=m.scrollHeight},30);
}

/* ---- sheet helpers ---- */
function openSheet(html){$('sheet').innerHTML=html;$('overlay').classList.add('show');document.body.style.overflow='hidden'}
function closeSheet(){$('overlay').classList.remove('show');document.body.style.overflow=''}

/* ---- info platform ---- */
function infoPlatform(){
  return `<div class="sec-title">Tentang Keamanan</div>
  <div class="card" style="padding:6px 16px">
  ${[['🔒','Escrow dana','Uang ditahan PJP berlisensi (Xendit), cair setelah Anda setujui'],
     ['🔑','Kode selesai','Tukang butuh kode dari Anda — cegah klaim selesai palsu'],
     ['📍','Verifikasi GPS','Tukang wajib check-in di lokasi'],
     ['📷','Foto bukti','Foto sebelum & sesudah tiap pekerjaan'],
     ['🆔','KYC tukang','KTP & wajah diverifikasi sebelum aktif'],
     ['⚖️','Mediasi sengketa','Dana dibekukan & ditinjau tim bila ada masalah']].map(([i,t,d])=>`<div class="logitem"><div style="font-size:18px">${i}</div><div class="lc"><h6>${t}</h6><p>${d}</p></div></div>`).join('')}
  </div>`;
}

/* ---- countdown ---- */
function startCountdowns(){
  document.querySelectorAll('.countdown[data-cd]').forEach(el=>{
    const end=+el.dataset.cd;
    const tick=()=>{const d=end-Date.now();if(d<=0){el.textContent='0:00:00';return}
      const h=Math.floor(d/3600000),m=Math.floor(d%3600000/60000),s=Math.floor(d%60000/1000);
      el.textContent=`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`};
    tick();clearInterval(el._iv);el._iv=setInterval(tick,1000);
  });
}
function timeAgo(t){const d=(Date.now()-t)/1000;if(d<60)return'baru saja';if(d<3600)return Math.floor(d/60)+' mnt lalu';if(d<86400)return Math.floor(d/3600)+' jam lalu';return Math.floor(d/86400)+' hari lalu'}

/* ---- icons ---- */
function icHome(){return svg('<path d="M3 11l9-7 9 7M5 10v10h14V10"/>')}
function icList(){return svg('<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>')}
function icUser(){return svg('<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>')}
function icSearch(){return svg('<circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/>')}
function icWallet(){return svg('<rect x="3" y="6" width="18" height="13" rx="2"/><path d="M16 12h3M3 9h18"/>')}
function svg(p){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`}
function emptyBox(ic,t,p){return `<div class="empty"><div class="ic">${ic}</div><h4 style="font-size:15px;margin-top:8px">${t}</h4><p>${p}</p></div>`}

render();
</script>
