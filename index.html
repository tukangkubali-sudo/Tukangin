.msgs{padding:12px;display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto}
.msg{max-width:78%;padding:9px 12px;border-radius:14px;font-size:13.5px}
.msg.me{align-self:flex-end;background:var(--teal);color:#fff;border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:var(--surface);border:1px solid var(--line);border-bottom-left-radius:4px}
.chat-in{display:flex;gap:8px;padding:10px;border-top:1px solid var(--line)}
.chat-in input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:10px 14px;outline:none}

.logitem{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}

.logitem p{font-size:11.5px;color:var(--muted);margin-top:1px}
.botnav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;padding:7px 6px 9px;z-index:20}

.navb svg{width:23px;height:23px}.navb.on{color:var(--teal)}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:600;z-index:200;opacity:0;transition:.28s;max-width:380px;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:42px 20px;color:var(--muted)}
.empty .ic{font-size:44px;opacity:.5}.empty p{font-size:13.5px;margin-top:8px}
.infoline{display:flex;gap:8px;font-size:12px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 12px;align-items:flex-start}
.profav{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--brass),var(--brass-d));display:grid;place-items:center;color:#fff;font-weight:800;font-size:22px}
.kyc{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ok);background:#E7F5EC;padding:3px 9px;border-radius:7px;margin-top:5px}
/* auth */
.auth{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;min-height:100vh}
.auth .logo-lg{width:60px;height:60px;border-radius:16px;background:var(--brass);display:grid;place-items:center;font-size:30px;margin-bottom:16px}
.auth h1{font-size:26px;font-weight:800;letter-spacing:-.02em}
.auth p.sub{font-size:13.5px;color:var(--muted);margin:4px 0 22px}
.seg{display:flex;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:3px;gap:3px;margin-bottom:18px}
.seg button{flex:1;padding:10px;border-radius:9px;font-size:13.5px;font-weight:700;color:var(--muted)}
.seg button.on{background:#fff;color:var(--teal);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.errbox{background:#FBE9E7;color:#a8352a;font-size:12.5px;font-weight:600;padding:11px 13px;border-radius:11px;margin-bottom:14px}
.loadwrap{flex:1;display:grid;place-items:center;min-height:100vh;color:var(--muted)}
.spinner{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

/* ====== KONFIGURASI ====== */

/* ====== util ====== */

const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600)}
const PROMO_KOMISI_GRATIS=false; /* promo peluncuran: tukang TIDAK dipotong komisi. Set false untuk mengaktifkan komisi berjenjang. */
const FEE_KOM=[[1000000,0.08],[3000000,0.05],[7000000,0.03],[Infinity,0.02]]; /* komisi tukang (berjenjang, marginal) */
const FEE_LAY=[[1000000,0.05],[3000000,0.03],[7000000,0.02],[Infinity,0.015]]; /* biaya layanan konsumen (berjenjang) */
function tierFee(h,br){let f=0,last=0;for(const t of br){const cap=t[0],rate=t[1];if(h>last){f+=(Math.min(h,cap)-last)*rate;last=cap;}else break;}return Math.round(f);}
function fee(h){h=+h||0;const layanan=tierFee(h,FEE_LAY);const komisi=PROMO_KOMISI_GRATIS?0:tierFee(h,FEE_KOM);return{harga:h,layanan,komisi,escrow:h+layanan,payout:h-komisi}}
const KAT=[{id:'listrik',nm:'Listrik',ic:'⚡'},{id:'pipa',nm:'Pipa',ic:'🔧'},{id:'ac',nm:'AC',ic:'❄️'},{id:'las',nm:'Las/Pagar',ic:'🔥'},{id:'cat',nm:'Cat',ic:'🎨'},{id:'bocor',nm:'Atap Bocor',ic:'🏠'},{id:'kunci',nm:'Kunci',ic:'🔑'},{id:'umum',nm:'Lainnya',ic:'🛠️'}];
const katOf=id=>KAT.find(k=>k.id===id)||KAT[7];
const ST={MENUNGGU_DANA:{l:'Menunggu Pembayaran',c:'b-wait'},MENUNGGU_VERIFIKASI:{l:'Cek Pembayaran',c:'b-wait'},DANA_DITAHAN:{l:'Dana Ditahan',c:'b-hold'},DIKERJAKAN:{l:'Dikerjakan',c:'b-work'},MENUNGGU_KONFIRMASI:{l:'Menunggu Konfirmasi',c:'b-confirm'},SELESAI:{l:'Selesai',c:'b-done'},SENGKETA:{l:'Sengketa',c:'b-dispute'},DIBATALKAN:{l:'Dibatalkan',c:'b-dispute'}};
/* Identitas usaha — EDIT di sini bila perlu */
const BIZ={nama:'Tukangin',badan:'Guna Merta Home Service',pemilik:'Deny',kota:'Bali',alamat:'Jln Tukad Irawadi No. 44',wa:'6282233089533',waTampil:'0822-3308-9533',bank:'BNI',rek:'1881552632',rekNama:'Putu Helyvia',garansiHari:7,retensiPersen:10,markupHarian:0.15};
/* Garansi pengerjaan per kategori (hari) — sesuai umumnya di Bali, bisa diubah */
const GARANSI={listrik:7,pipa:14,ac:14,las:30,cat:14,bocor:30,kunci:7,umum:7};
function garansiHariKat(kat){return GARANSI[kat]||7}
const otp=()=>String(Math.floor(1000+Math.random()*9000));

/* ====== state ====== */
let ME=null;            // profil pengguna login
let VIEW={tab:'beranda',orderId:null};
let ORDERS=[];

/* ====== AUTH ====== */
let authMode='welcome';
async function boot(){
  if(window.__recovery){renderResetForm();return;}
  const {data:{session}}=await sb.auth.getSession();
  if(!session){renderAuth();return}
  await loadMe();
}
async function loadMe(){
  const {data:{user}}=await sb.auth.getUser();
  if(!user){renderAuth();return}
  let {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).maybeSingle();
  if(!prof){ // profil belum ada (mis. daftar tapi gagal simpan) -> minta lengkapi
    renderCompleteProfile(user);return;
  }
  ME=prof;
  if(ME.is_admin){try{sb.from('profiles').update({last_aktif:new Date().toISOString()}).eq('id',ME.id).then(()=>{});}catch(e){}}
  VIEW={tab: ME.role==='pemilik'?'beranda':'kerja', orderId:null};
  await refresh();
  setupRealtime();
}
function renderAuth(){
  if(authMode==='welcome'){$('app').innerHTML=welcomeHTML();return;}
  $('app').innerHTML=`<div class="auth">
    <div style="margin-bottom:6px"><span onclick="setAuth('welcome')" style="color:var(--muted);font-size:13px">‹ Kembali</span></div>

    <div class="seg"><button id="seg-login" class="${authMode==='login'?'on':''}" onclick="setAuth('login')">Masuk</button>
      <button id="seg-daftar" class="${authMode==='daftar'?'on':''}" onclick="setAuth('daftar')">Daftar</button></div>
    <div id="autherr"></div>
    <div id="authform"></div>
  </div>`;
  renderAuthForm();
}
function welcomeHTML(){return `<div style="min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:linear-gradient(160deg,#0D5953,#0b463f)">

      ${[['✔️','Tukang terverifikasi','Identitas (KTP & wajah) dicek'],['🔒','Pembayaran aman','Dana ditahan sampai kerja selesai'],['🛡️','Bergaransi','Ada masalah? Diperbaiki tanpa biaya']].map(([i,t,s])=>`<div style="display:flex;align-items:center;gap:13px;background:rgba(255,255,255,.12);border-radius:14px;padding:13px 15px"><div style="font-size:21px">${i}</div><div><div style="font-weight:800;font-size:14.5px">${t}</div><div style="font-size:12px;color:#cfe7e3">${s}</div></div></div>`).join('')}

    ${sudahTerpasang()?'':`<button class="btn btn-ghost" style="margin-top:11px;border:1.5px solid #0D5953;color:#0D5953;font-weight:800" onclick="pasangApp()">📲 Pasang Aplikasi ke Layar HP</button>`}

</div>`;}

function panduanPasangHTML(){
  const ua=navigator.userAgent||'';const ios=/iphone|ipad|ipod/i.test(ua);
  const steps=ios

async function doDaftar(){
  authErr('');
  const nama=$('a_nama').value.trim(),telp=$('a_telp').value.trim(),email=$('a_email').value.trim(),pass=$('a_pass').value;
  if(!nama||!email||pass.length<6){authErr('Lengkapi nama, email, dan password (min. 6 karakter).');return}
  if(!/^(0|62)?8\d{7,12}$/.test(telp.replace(/\D/g,''))){authErr('Masukkan nomor HP/WhatsApp aktif (mis. 08xxxxxxxxxx). Wajib untuk absen & komunikasi.');return}
  if(pickedRole==='tukang'&&!($('a_setuju')&&$('a_setuju').checked)){authErr('Centang persetujuan Aturan & Komitmen Tukang dulu.');return}
  busy(true,'Buat Akun');
  const {data,error}=await sb.auth.signUp({email,password:pass});
  if(error){authErr(error.message);busy(false,'Buat Akun');return}
  if(!data.session){ // email confirm masih aktif
    authErr('Akun dibuat, tapi verifikasi email masih aktif. Matikan "Confirm email" di Supabase → Authentication → Providers → Email, lalu coba Masuk.');
    busy(false,'Buat Akun');return;
  }
  const uid=data.user.id;
  const {error:pe}=await sb.from('profiles').insert({id:uid,nama,telp,role:pickedRole,inisial:initial(nama),kyc:pickedRole==='tukang',setuju_aturan:pickedRole==='tukang'?new Date().toISOString():null});
  if(pe){authErr('Akun dibuat tapi gagal simpan profil: '+pe.message);busy(false,'Buat Akun');return}
  await loadMe();
}

let RT=null,_rtT=null;
function setupRealtime(){
  try{
    if(RT){sb.removeChannel(RT);RT=null;}
    RT=sb.channel('rt-tukangin')
      .on('postgres_changes',{event:'*',schema:'public',table:'orders'},rtEvent)
      .on('postgres_changes',{event:'*',schema:'public',table:'messages'},rtEvent)
      .subscribe();
    if(ME&&ME.is_admin&&'Notification'in window&&Notification.permission==='default'){try{Notification.requestPermission();}catch(e){}}
  }catch(e){}
}
function rtEvent(payload){
  rtNotify(payload);
  clearTimeout(_rtT);
  _rtT=setTimeout(()=>{refresh();},600);
}
function rtNotify(payload){
  if(!ME)return;
  const o=payload.new||{};let msg=null;
  if(payload.table==='messages'){ if(o.sender_id&&o.sender_id!==ME.id)msg='💬 Pesan baru masuk'; }
  else if(payload.table==='orders'&&ME.is_admin){
    if(o.status==='MENUNGGU_VERIFIKASI')msg='💵 Pembayaran baru — perlu dicek';
    else if(o.status==='MENUNGGU_KONFIRMASI')msg='✅ Pekerjaan menunggu konfirmasi';
    else if(o.status==='SENGKETA')msg='⚠️ Ada sengketa baru';
  }
  if(msg){toast(msg);notifBrowser(msg);}
}
function notifBrowser(text){
  try{
    if(!('Notification'in window))return;
    if(Notification.permission==='granted')new Notification('Tukangin',{body:text});
    else if(Notification.permission==='default')Notification.requestPermission();
  }catch(e){}
}

let _myLoc=null,_trackTimer=null,_trackOrder=null;
const AREAS=['Denpasar','Kuta','Legian','Seminyak','Kerobokan','Canggu','Jimbaran','Nusa Dua','Sanur','Ubud','Gianyar','Tabanan','Badung','Mengwi','Abiansemal'];

function ensureMyLoc(){if(_myLoc||!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>{_myLoc={lat:p.coords.latitude,lng:p.coords.longitude};if(VIEW&&VIEW.tab==='kerja'&&!VIEW.orderId)render();},()=>{},{enableHighAccuracy:false,timeout:8000,maximumAge:60000});}
function jarakKe(o){return (_myLoc&&o.lat&&o.lng)?haversine(_myLoc.lat,_myLoc.lng,o.lat,o.lng):null;}
function mintaLokasi(){if(!navigator.geolocation){toast('HP tidak mendukung lokasi');return}toast('Meminta izin lokasi…');navigator.geolocation.getCurrentPosition(p=>{_myLoc={lat:p.coords.latitude,lng:p.coords.longitude};toast('✅ Lokasi aktif');render();},()=>{toast('Izin lokasi ditolak. Aktifkan di pengaturan browser HP.');},{enableHighAccuracy:true,timeout:10000,maximumAge:0});}
function fmtJarak(m){return m==null?'':(m>1000?(m/1000).toFixed(1)+' km':Math.round(m)+' m');}
function tukangAvailable(){
  let arr=ORDERS.filter(o=>!o.tukang_id&&o.status==='DANA_DITAHAN');
  if(_myLoc)arr=arr.slice().sort((a,b)=>((jarakKe(a)??1e12)-(jarakKe(b)??1e12)));
  return arr;
}
function startTracking(orderId){
  if(_trackOrder===orderId&&_trackTimer)return;
  stopTracking();
  if(!navigator.geolocation)return;
  _trackOrder=orderId;
  const send=()=>navigator.geolocation.getCurrentPosition(async pos=>{
    try{await sb.from('orders').update({tukang_lat:pos.coords.latitude,tukang_lng:pos.coords.longitude,loc_updated:new Date().toISOString()}).eq('id',orderId);}catch(e){}
  },()=>{},{enableHighAccuracy:true,maximumAge:10000,timeout:15000});
  send();_trackTimer=setInterval(send,25000);
}
function stopTracking(){if(_trackTimer)clearInterval(_trackTimer);_trackTimer=null;_trackOrder=null;}
function locTukangSection(o){
  if(!o.tukang_id||o.tukang_lat==null||!o.loc_updated)return '';
  if(!['DANA_DITAHAN','DIKERJAKAN'].includes(o.status))return '';
  const amP=o.pemilik_id===ME.id;
  if(!(amP||ME.is_admin||o.tukang_id===ME.id))return '';
  let jarak='';
  if(o.lat&&o.lng){jarak=fmtJarak(haversine(o.tukang_lat,o.tukang_lng,o.lat,o.lng));}
  return `<div class="sec-title">📍 Lokasi Tukang (langsung)</div>
    <div class="card" style="padding:14px">
      <div style="font-size:13.5px">${jarak?`Sekitar <b>${jarak}</b> dari lokasi pekerjaan`:'Lokasi tukang tersedia'}</div>
      <div class="meta" style="margin-top:2px">Diperbarui ${timeAgo(o.loc_updated)}</div>

    </div>`;
}

function pilihKyc(jenis){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.setAttribute('capture',jenis==='wajah'?'user':'environment');
  inp.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  inp.onchange=()=>{if(inp.files&&inp.files[0])uploadKyc(jenis,inp.files[0]);inp.remove();};
  document.body.appendChild(inp);inp.click();
}
async function uploadKyc(jenis,file){
  toast('Memproses…');
  try{
    const dataUrl=await kompresFoto(file);
    let warnFace=false;
    if(jenis==='wajah'){try{if('FaceDetector'in window){const img=new Image();img.src=dataUrl;await img.decode();const faces=await new FaceDetector().detect(img);warnFace=!faces||faces.length===0;}}catch(e){}}
    const col=jenis==='ktp'?'ktp_url':'wajah_url';
    const {error}=await sb.from('profiles').update({[col]:dataUrl}).eq('id',ME.id);
    if(error)throw error;
    ME[col]=dataUrl;render();
    toast(warnFace?'⚠️ Tersimpan, tapi wajah kurang jelas — sebaiknya foto ulang':'✅ Foto tersimpan');
  }catch(e){toast('Gagal: '+(e.message||e))}
}
function validateNIK(nik){
  if(!/^\d{16}$/.test(nik))return 'NIK harus 16 angka.';
  let dd=parseInt(nik.substr(6,2),10),mm=parseInt(nik.substr(8,2),10);
  if(dd>40)dd-=40;
  if(mm<1||mm>12||dd<1||dd>31)return 'NIK tidak valid (cek angka tanggal lahir).';
  return '';
}
async function kirimVerifikasi(){
  if(!ME.ktp_url||!ME.wajah_url){toast('Unggah KTP & selfie dulu');return}
  if(!($('setujuData')&&$('setujuData').checked)){toast('Centang persetujuan penggunaan data dulu ya');return}
  const nik=($('nikInput')?.value||'').trim();
  const err=validateNIK(nik);
  if(err){toast('⚠️ '+err);return}

  const {error}=await sb.from('profiles').update({nik,verif_status:'menunggu'}).eq('id',ME.id);

async function verifPembayaran(id){
  const {error}=await sb.from('orders').update({status:'DANA_DITAHAN'}).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,'Pembayaran diverifikasi','Admin mengonfirmasi dana masuk & ditahan');
  toast('✅ Dana dikonfirmasi — pesanan dibuka ke tukang');renderAdmin();
}
function p_bayar(o){const t=(ADMIN_TUKANG||[]).find(x=>x.id===o.tukang_id);return t&&t.bayar_metode?esc(t.bayar_metode+(t.bayar_detail?' '+t.bayar_detail:'')):'metode belum diatur';}
function sisLabel(o){return o.sistem==='harian'?'<span style="font-size:9.5px;font-weight:700;background:#FFF1D6;color:#9A6B00;padding:2px 7px;border-radius:6px">📅 Harian</span>':'<span style="font-size:9.5px;font-weight:700;background:#E7F2F0;color:#0D5953;padding:2px 7px;border-radius:6px">📦 Borongan</span>';}
function p_tel(o){const t=(ADMIN_TUKANG||[]).find(x=>x.id===o.tukang_id);return (t&&t.telp)||'';}
function waOrder(o,msg){const tel=p_tel(o);return tel?waLink(tel,msg):'';}
function waBtnKecil(o,msg){const w=waOrder(o,msg);return w?`<a href="${w}" target="_blank" onclick="event.stopPropagation()" style="font-size:11px;font-weight:700;color:#128C3E;text-decoration:none;border:1px solid #25D366;padding:3px 9px;border-radius:7px;white-space:nowrap">💬 WA</a>`:'';}
function waLink(telp,msg){let n=(telp||'').replace(/\D/g,'');if(!n)return '';if(n[0]==='0')n='62'+n.slice(1);else if(n[0]==='8')n='62'+n;return `https://wa.me/${n}?text=${encodeURIComponent(msg||'')}`;}
function p_wa(o){const t=(ADMIN_TUKANG||[]).find(x=>x.id===o.tukang_id);const tel=t&&t.telp;if(!tel)return '';const b=o.biaya||fee(o.harga);return waLink(tel,`Halo ${o.tukang_nama||''}, pekerjaan ${o.judul||'-'} sudah selesai. Bayaran Anda ${rp(b.payout)} akan kami cairkan. Mohon konfirmasi penerimaan ya. Terima kasih, Tukangin`);}
async function bayarTukang(id){
  const o=(ORDERS||[]).find(x=>x.id===id)||{};const b=o.biaya||fee(o.harga);
  const t=(ADMIN_TUKANG||[]).find(x=>x.id===o.tukang_id)||{};
  const tunai=/tunai|cash/i.test(t.bayar_metode||'');
  if(tunai){
    const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.setAttribute('capture','environment');
    inp.style.cssText='position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
    inp.onchange=async()=>{if(inp.files&&inp.files[0]){toast('Memproses kuitansi…');try{const data=await kompresFoto(inp.files[0]);await simpanBayarTukang(id,data);}catch(e){toast('Gagal memproses foto');}}inp.remove();};
    document.body.appendChild(inp);inp.click();
    toast('📷 Foto kuitansi/tanda terima tunai');
  }else{
    if(!confirm(`Tandai bayaran ${rp(b.payout)} ke ${o.tukang_nama||'tukang'} sudah ditransfer?`))return;
    await simpanBayarTukang(id,null);
  }
}
async function simpanBayarTukang(id,kuitansi){
  const o=(ORDERS||[]).find(x=>x.id===id)||{};const b=o.biaya||fee(o.harga);
  const upd={tukang_dibayar:true,tukang_dibayar_tgl:new Date().toISOString()};
  if(kuitansi)upd.kuitansi_url=kuitansi;
  const {error}=await sb.from('orders').update(upd).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,'Bayaran tukang dicairkan',`${rp(b.payout)} ke ${o.tukang_nama||'tukang'}${kuitansi?' (kuitansi tunai)':''}`);
  toast('✅ Ditandai sudah dibayar');renderAdmin();

  const cel=v=>{v=(v==null?'':String(v));return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};

function statTukang(){
  const mine=ORDERS.filter(o=>o.tukang_id===ME.id);
  const selesai=mine.filter(o=>o.status==='SELESAI');
  const aktif=mine.filter(o=>['DANA_DITAHAN','DIKERJAKAN'].includes(o.status));
  const nunggu=mine.filter(o=>o.status==='MENUNGGU_KONFIRMASI');
  const sum=arr=>arr.reduce((s,o)=>s+((o.biaya||fee(o.harga)).payout||0),0);
  const retensi=selesai.filter(o=>{const g=garansiInfo(o);return g&&g.aktif;}).reduce((s,o)=>s+Math.round(((o.biaya||fee(o.harga)).payout||0)*(BIZ.retensiPersen||0)/100),0);
  return {selesai:selesai.length,aktif:aktif.length,total:sum(selesai),pending:sum(nunggu),retensi};
}

function pickKat(id,el){draft.kat=id;document.querySelectorAll('#katchips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');const le=$('lasextra');if(le)le.style.display=id==='las'?'block':'none';}

function pickSistem(s,el){draft.sistem=s;document.querySelectorAll('#sysseg button').forEach(b=>b.classList.remove('on'));el.classList.add('on');const bo=$('borongan'),ha=$('harian');if(bo)bo.style.display=s==='borongan'?'block':'none';if(ha)ha.style.display=s==='harian'?'block':'none';}
function hitungHarian(){

async function estimasiAI(){
  if(draft.kat==='las'){ if(!(draft.panjang&&draft.tinggi)&&(draft.desk||'').trim().length<6){toast('Isi ukuran atau deskripsi dulu');return} }
  else if((draft.desk||'').trim().length<6){toast('Isi deskripsi dulu');return}
  const box=$('estbox'),btn=$('aibtn');btn.disabled=true;btn.textContent='Menaksir…';
  const h=await taksir(draft);
  box.querySelector('.rng').textContent=`${rp(h.min)} – ${rp(h.max)}`;
  box.querySelector('.note').textContent=h.alasan;
  const f=$('d_harga');draft.harga=String(h.rekomendasi);if(f)f.value=rp(h.rekomendasi);
  btn.disabled=false;btn.textContent='✨ Taksir Ulang';
}
async function taksir(d){
  const kat=d.kat,desk=d.desk||'';
  const luas=(parseFloat(d.panjang)||0)*(parseFloat(d.tinggi)||0);
  if(AI_ENDPOINT){
    try{
      let prompt;
      if(kat==='las'&&luas>0){
        const isPintu=/dorong|sliding|geser|pintu|gerbang/i.test(desk);
        prompt=`Anda penaksir harga jasa las/pagar besi di ${d.lokasi||'Bali'}, Bali, memakai harga pasar lokal terkini. Pekerjaan pagar/pintu besi ukuran ${d.panjang}m x ${d.tinggi}m = ${luas.toFixed(1)} m².${isPintu?' Ini PINTU DORONG (sliding) — tambahkan biaya rel, roda, dan rangka penguat.':''} Lingkup: ${d.material?'TERMASUK material (besi hollow, spandek, rel, roda, cat).':'JASA saja (las + pasang, material disediakan pemilik).'} Deskripsi: "${desk}". Hitung per m² lalu total. Balas HANYA JSON {"min":n,"max":n,"rekomendasi":n,"alasan":"maks 12 kata"}`;
      }else{
        prompt=`Anda penaksir harga JASA tukang di ${d.lokasi||'Bali'}, Bali, memakai harga pasar lokal terkini. Patokan kasar: ganti bohlam/saklar Rp25.000-75.000; keran/pipa kecil Rp75.000-200.000; cuci AC Rp60.000-150.000; listrik kecil Rp150.000-400.000; cat ruangan Rp300.000-800.000. Minimum panggil Rp50.000. Lingkup: ${d.material?'TERMASUK material (perkirakan jasa + bahan).':'JASA tenaga saja (material disediakan pemilik).'} Kategori: ${katOf(kat).nm}. Deskripsi: "${desk}". Balas HANYA JSON {"min":n,"max":n,"rekomendasi":n,"alasan":"maks 10 kata"}`;
      }
      const r=await fetch(AI_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      const dd=await r.json();const t=(dd.content||[]).map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
      const j=JSON.parse(t);if(typeof j.min==='number')return{min:j.min,max:j.max,rekomendasi:j.rekomendasi||Math.round((j.min+j.max)/2),alasan:j.alasan||'Taksiran AI'};
    }catch(e){}
  }
  return taksirLokal(d);
}
function taksirLokal(d){
  const kat=d.kat,t=(d.desk||'').toLowerCase();
  const luas=(parseFloat(d.panjang)||0)*(parseFloat(d.tinggi)||0);
  if(kat==='las'&&luas>0){
    const isPintu=/dorong|sliding|geser|pintu|gerbang/.test(t);
    let lo,hi; if(d.material){lo=400000;hi=650000}else{lo=100000;hi=250000}
    let min=luas*lo,max=luas*hi;
    if(isPintu){if(d.material){min+=600000;max+=1500000}else{min+=200000;max+=500000}}
    min=Math.round(min/10000)*10000;max=Math.round(max/10000)*10000;
    return{min,max,rekomendasi:Math.round((min+max)/2/10000)*10000,alasan:`Per m² (${d.material?'+material':'jasa'})${isPintu?' · pintu dorong':''}`};
  }
  if(/bohlam|lampu|saklar|stop ?kontak|fitting/.test(t)&&/ganti|pasang|mati|rusak|baru/.test(t))return{min:25000,max:75000,rekomendasi:50000,alasan:'Pekerjaan ringan'};
  const base={listrik:[100000,400000],pipa:[100000,400000],ac:[60000,200000],las:[200000,700000],cat:[300000,900000],bocor:[200000,600000],kunci:[80000,250000],umum:[75000,400000]};
  let[lo,hi]=base[kat]||base.umum;let f=1;
  if(/ganti|total|semua|banyak|besar|parah/.test(t))f+=0.4;if(/cek|kecil|ringan|mudah/.test(t))f-=0.25;
  f=Math.max(0.6,Math.min(1.6,f));lo=Math.max(50000,Math.round(lo*f/5000)*5000);hi=Math.round(hi*f/5000)*5000;
  return{min:lo,max:hi,rekomendasi:Math.round((lo+hi)/2/5000)*5000,alasan:d.material?'Estimasi jasa — tambahkan biaya material':'Estimasi jasa tenaga'};
}

function chatBox(o,msgs){

    <div class="msgs" id="msgs">${msgs.map(mm=>`<div class="msg ${mm.sender_id===ME.id?'me':'them'}">${esc(mm.isi)}</div>`).join('')||'<p style="color:var(--muted);font-size:12px;text-align:center">Mulai percakapan…</p>'}</div>
    ${templateChips(o)}
    <div class="chat-in"><input id="chatin" placeholder="Tulis pesan…" onkeydown="if(event.key==='Enter')kirim('${o.id}')"><button onclick="kirim('${o.id}')">➤</button></div></div>`;
}
function templateChips(o){
  if(!ME||!ME.is_admin)return '';
  const T=[
    'Halo, terima kasih sudah menghubungi Tukangin. Ada yang bisa kami bantu?',

function setChat(t){const el=$('chatin');if(el){el.value=t;el.focus();}}

/* ====== AKSI ESCROW ====== */
async function bayar(id){
  const o=ORDERS.find(x=>x.id===id);
  if(!o.bukti_transfer_url){toast('Unggah bukti transfer dulu ya');return}
  await sb.from('orders').update({status:'MENUNGGU_VERIFIKASI'}).eq('id',id);
  await addLog(id,'Pemilik menyatakan sudah transfer','Menunggu verifikasi admin');
  await refresh();openOrder(id);toast('Terkirim — menunggu admin memverifikasi pembayaran');
}
async function ambil(id){
  if(ME.verif_status!=='terverifikasi'){toast('Selesaikan verifikasi identitas dulu');VIEW.tab='profil';render();return}
  const {error}=await sb.rpc('ambil_pesanan',{p_order:id});
  if(error){toast('Gagal: '+error.message);return}
  VIEW.tab='aktif';await refresh();openOrder(id);toast('Pekerjaan diambil');
}
function hariPenuh(o){return (o.absensi||[]).filter(a=>a.masuk&&a.keluar).length}
function jamID(t){return t?new Date(t).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}):'—'}
function tgljamID(t){return new Date(t).toLocaleDateString('id-ID',{day:'numeric',month:'short'})}
function praKerjaSection(o,amPemilik){
  if(!o.tukang_id||!['DANA_DITAHAN','DIKERJAKAN'].includes(o.status))return '';
  const amT=o.tukang_id===ME.id, sv=o.survei||{};
  let svHtml;
  if(sv.sudah) svHtml=`<div class="infoline" style="background:#E7F5EC"><span>✅ Sudah survei lokasi${sv.waktu?' · '+timeAgo(sv.waktu):''}.</span></div>`;
  else if(amT) svHtml=`<button class="btn btn-primary btn-sm" onclick="surveiLokasi('${o.id}')">📍 Catat Survei Lokasi (GPS)</button><p style="font-size:11px;color:var(--muted);margin-top:6px">Cek lokasi dulu sebelum mulai. Tekan saat Anda tiba untuk survei.</p>`;
  else svHtml=`<div class="infoline"><span>⌛ Tukang belum survei lokasi.</span></div>`;
  return `<div class="sec-title">Survei Lokasi</div>
   <div class="card" style="padding:14px">${svHtml}
     <div class="infoline" style="margin-top:12px;background:#FFF7E8"><span>💡 Semua kesepakatan & pembayaran <b>lewat aplikasi</b> agar tercatat dan aman bagi kedua pihak.</span></div>
   </div>`;
}
async function surveiLokasi(id){
  toast('Mengambil lokasi…');let loc={};try{const p=await getGPS();loc={lat:p.lat,lng:p.lng};}catch(e){}
  const survei={sudah:true,waktu:new Date().toISOString(),...loc};
  const {error}=await sb.from('orders').update({survei}).eq('id',id);
  if(error){toast('Gagal: '+error.message);return}
  await addLog(id,'Survei lokasi','Tukang telah survei lokasi');toast('✅ Survei tercatat');await refresh();openOrder(id);
}
const KERJA={mulai:8,selesai:17,toleransi:15};
function jamHari(a){
  if(!a||!a.masuk||!a.keluar)return null;
  const M=new Date(a.masuk),K=new Date(a.keluar);
  const start=new Date(M);start.setHours(KERJA.mulai,0,0,0);
  const end=new Date(M);end.setHours(KERJA.selesai,0,0,0);
  let masukEf=M>start?M:start;if(M<=new Date(start.getTime()+KERJA.toleransi*60000))masukEf=start;
  let keluarEf=K<end?K:end;if(K>=new Date(end.getTime()-KERJA.toleransi*60000))keluarEf=end;
  const totalMs=end-start;let workedMs=keluarEf-masukEf;if(workedMs<0)workedMs=0;
  const fraksi=Math.max(0,Math.min(1,workedMs/totalMs));
  const telatMenit=Math.max(0,Math.round((Math.min(M.getTime(),end.getTime())-start.getTime())/60000));
  const pulangAwalMenit=Math.max(0,Math.round((end.getTime()-Math.max(K.getTime(),start.getTime()))/60000));
  return {jam:workedMs/3600000,fraksi,telatMenit,pulangAwalMenit};
}
function bayarHarian(o){

}

function getGPS(){return new Promise((res,rej)=>{if(!navigator.geolocation)return rej('no geo');navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),e=>rej(e),{enableHighAccuracy:true,timeout:10000,maximumAge:0});});}
function haversine(a,b,c,d){const R=6371000,r=x=>x*Math.PI/180;const dLat=r(c-a),dLon=r(d-b);const h=Math.sin(dLat/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));}

function kompresFoto(file){
  return new Promise((res,rej)=>{
    const img=new Image(),url=URL.createObjectURL(file);
    img.onload=()=>{
      const max=1000;let w=img.width,h=img.height;
      if(w>h&&w>max){h=Math.round(h*max/w);w=max}else if(h>max){w=Math.round(w*max/h);h=max}
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);
      res(c.toDataURL('image/jpeg',0.6));
    };
    img.onerror=()=>rej('gambar gagal dimuat');img.src=url;
  });
}

    const {data:ords}=await sb.from('orders').select('*');if(!ords)return;
    const now=Date.now(),limit=KONFIRMASI_TIMEOUT_HARI*86400000;

      if(o.status==='MENUNGGU_KONFIRMASI'&&o.minta_konfirmasi_tgl&&(now-new Date(o.minta_konfirmasi_tgl).getTime())>=limit){
        const upd={status:'SELESAI',selesai_tgl:new Date().toISOString(),auto_selesai:true};
        if(o.sistem==='harian'){const bh=bayarHarian(o),base=bh.bayar,markup=Math.round(base*(BIZ.markupHarian||0));upd.biaya={harga:base,layanan:markup,komisi:0,escrow:base+markup,payout:base};}

  ['Proses sengketa','Admin meninjau bukti: foto sebelum/sesudah, absensi, dan riwayat aktivitas, lalu memutuskan seadil mungkin.'],
  ['Garansi','Keluhan dalam masa garansi diperbaiki <b>tanpa biaya tambahan</b>. Tukang yang menolak memperbaiki dikenai sanksi.']
]));}
function openAturanPelanggan(){openSheet(infoSheet('📋 Aturan & Hak Pelanggan','Hak dan tanggung jawab Anda sebagai pemilik',[
  ['Hak Anda','Tukang terverifikasi, dana aman lewat escrow, pekerjaan bergaransi, serta perlindungan & dukungan admin bila ada masalah.'],
  ['Jelaskan pekerjaan dengan benar','Tulis kebutuhan sejelas mungkin (foto sangat membantu) agar tukang & harga sesuai.'],
  ['Bayar lewat app','Selalu bayar melalui Tukangin. <b>Membayar di luar app menghilangkan jaminan & garansi.</b>'],
  ['Konfirmasi tepat waktu','Setelah pekerjaan selesai dan benar, segera konfirmasi agar dana cair ke tukang. Jangan menahan tanpa alasan.'],
  ['Saling menghormati','Perlakukan tukang dengan hormat dan beri akses/lokasi yang benar. Penilaian Anda membantu menjaga kualitas.']
]));}
function panduanPakai(){
  const tk=(typeof ME!=='undefined')&&ME&&ME.role==='tukang';
  const items=tk?[
    ['1. Verifikasi dulu','Unggah KTP + selfie di Profil, tunggu disetujui admin. Setujui Aturan, isi Keahlian & Cara Pembayaran.'],
    ['2. Cari Kerja','Buka tab Cari Kerja, ambil pekerjaan yang sesuai keahlian & lokasi Anda.'],
    ['3. Mulai kerja','<b>Borongan:</b> Check-in GPS di lokasi → kerjakan → unggah foto sebelum & sesudah. <b>Harian:</b> Absen Masuk & Keluar (GPS) tiap hari.'],
    ['4. Selesaikan','Minta <b>Kode Selesai</b> dari pelanggan lalu masukkan. Tunggu pelanggan konfirmasi.'],
    ['5. Dibayar','Setelah dikonfirmasi, bayaran Anda diteruskan. Pantau di Profil → Penghasilan.']
  ]:[
    ['1. Buat Pesanan','Pilih kategori, isi detail pekerjaan. Pilih sistem Borongan atau Harian.'],
    ['2. Bayar & unggah bukti','Transfer ke rekening yang tertera → tekan "Saya sudah transfer" → unggah bukti. Admin memverifikasi pembayaran.'],
    ['3. Tunggu tukang','Tukang terverifikasi akan mengambil pekerjaan Anda. Pantau statusnya di pesanan.'],
    ['4. Pekerjaan berjalan','Tukang check-in (GPS) & mengirim foto sebelum/sesudah. Untuk harian, ada absensi tiap hari.'],
    ['5. Konfirmasi & selesai','Jika puas, berikan <b>Kode Selesai</b> & tekan Konfirmasi — dana baru cair ke tukang. Jangan lupa beri rating.'],
    ['6. Garansi','Ada masalah dalam masa garansi? Lapor lewat pesanan, diperbaiki tanpa biaya.']
  ];
  openSheet(infoSheet(tk?'📖 Cara Kerja sebagai Tukang':'📖 Cara Pakai Tukangin',tk?'Dari daftar sampai dibayar':'Dari pesan sampai selesai',items));
}
function openSheet(html){
  let ov=$('ov');
  if(!ov){ov=document.createElement('div');ov.id='ov';ov.style.cssText='position:fixed;inset:0;background:rgba(8,30,28,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center';ov.onclick=e=>{if(e.target===ov)closeSheet()};document.body.appendChild(ov)}
  ov.innerHTML=`<div style="background:var(--surface);width:100%;max-width:440px;max-height:92vh;border-radius:24px 24px 0 0;overflow-y:auto">${html}</div>`;
  document.body.style.overflow='hidden';
}
let _mapTimer=null,_map=null,_mTukang=null;
function loadLeaflet(){return new Promise((res,rej)=>{
  if(window.L)return res(window.L);
  if(!document.getElementById('leafcss')){const l=document.createElement('link');l.id='leafcss';l.rel='stylesheet';l.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';document.head.appendChild(l);}
  const s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=()=>window.L?res(window.L):rej('gagal');s.onerror=()=>rej('gagal');document.head.appendChild(s);
});}
async function openPetaLangsung(orderId){
  let L;try{L=await loadLeaflet();}catch(e){toast('Gagal memuat peta — cek internet');return}
  const o=ORDERS.find(x=>x.id===orderId);if(!o)return;
  openSheet(`<div style="padding:16px 16px 8px"><h3 style="font-size:16px;font-weight:800;margin-bottom:8px">📍 Lokasi Tukang — Langsung</h3><div id="petamap" style="width:100%;height:60vh;border-radius:14px;overflow:hidden;background:#e8efed"></div><div id="petainfo" style="font-size:12px;color:var(--muted);margin-top:8px;text-align:center"></div><button class="btn btn-ghost" style="margin-top:10px" onclick="closeSheet()">Tutup</button></div>`);
  setTimeout(()=>{
    try{
      const center=[o.tukang_lat||o.lat||-8.65,o.tukang_lng||o.lng||115.13];
      _map=L.map('petamap').setView(center,15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(_map);
      if(o.lat&&o.lng)L.marker([o.lat,o.lng]).addTo(_map).bindPopup('📍 Lokasi pekerjaan');
      if(o.tukang_lat&&o.tukang_lng)_mTukang=L.marker([o.tukang_lat,o.tukang_lng]).addTo(_map).bindPopup('🔧 Tukang');
      setTimeout(()=>_map&&_map.invalidateSize(),200);
      updatePetaInfo(o);
      _mapTimer=setInterval(()=>refreshPeta(orderId),10000);
    }catch(e){}
  },150);
}
async function refreshPeta(orderId){
  try{
    const {data}=await sb.from('orders').select('tukang_lat,tukang_lng,loc_updated,lat,lng').eq('id',orderId).maybeSingle();
    if(!data||!_map||!window.L)return;
    if(data.tukang_lat&&data.tukang_lng){const ll=[data.tukang_lat,data.tukang_lng];if(_mTukang)_mTukang.setLatLng(ll);else _mTukang=window.L.marker(ll).addTo(_map).bindPopup('🔧 Tukang');_map.panTo(ll);}
    updatePetaInfo(data);
  }catch(e){}
}
function updatePetaInfo(o){
  const el=$('petainfo');if(!el)return;
  let j='';if(o.lat&&o.lng&&o.tukang_lat&&o.tukang_lng)j='Sekitar '+fmtJarak(haversine(o.tukang_lat,o.tukang_lng,o.lat,o.lng))+' dari lokasi · ';
  el.innerHTML=o.loc_updated?(j+'diperbarui '+timeAgo(o.loc_updated)):'Menunggu lokasi tukang…';
}
function closeSheet(){if(_mapTimer){clearInterval(_mapTimer);_mapTimer=null;}if(_map){try{_map.remove();}catch(e){}_map=null;_mTukang=null;}const ov=$('ov');if(ov)ov.remove();document.body.style.overflow=''}
function emptyBox(ic,t,p){return `<div class="empty"><div class="ic">${ic}</div><h4 style="font-size:15px;margin-top:8px">${t}</h4>${p?`<p>${p}</p>`:''}</div>`}
function timeAgo(t){const d=(Date.now()-new Date(t).getTime())/1000;if(d<60)return'baru saja';if(d<3600)return Math.floor(d/60)+' mnt lalu';if(d<86400)return Math.floor(d/3600)+' jam lalu';return Math.floor(d/86400)+' hari lalu'}

sb.auth.onAuthStateChange((e,session)=>{if(e==='SIGNED_OUT'){ME=null;renderAuth()}if(e==='PASSWORD_RECOVERY'){window.__recovery=true;renderResetForm()}});
boot();
</script>
